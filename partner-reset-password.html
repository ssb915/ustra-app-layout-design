<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustra - Business Reset Password</title>
<link rel="stylesheet" href="customer-style.css?v=2">
<style>
  body {
    background: var(--bg-darker);
    color: var(--text-primary);
    margin: 0;
    min-height: 100dvh;
    padding: 20px 16px 32px;
    display: flex;
    justify-content: center;
  }

  .wrap {
    position: relative;
    width: min(520px, 100%);
    padding: 26px 16px 32px;
    display: grid;
    align-content: start;
    gap: 18px;
  }

  .top-row {
    position: absolute;
    top: 26px;
    left: 16px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
  }

  .back-link {
    width: 44px;
    height: 44px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    color: var(--accent-gold);
    text-decoration: none;
    transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
  }

  .back-link:hover {
    border-color: rgba(226, 194, 117, 0.6);
    background: rgba(226, 194, 117, 0.08);
  }

  .back-link:active {
    transform: scale(0.96);
  }

  .back-link svg {
    width: 24px;
    height: 24px;
  }

  .logo {
    width: 110px;
    height: 110px;
    border-radius: 22px;
    background: #fff;
    display: grid;
    place-items: center;
    box-shadow: 0 14px 28px rgba(0, 0, 0, 0.25);
    margin: 5px auto 14px;
  }

  .logo img {
    width: 75%;
    height: 100%;
    object-fit: contain;
    filter: none;
  }

  h1 {
    font-size: 35px;
    text-align: center;
    margin-top: 4px;
    font-weight: 800;
    letter-spacing: 0.2px;
  }

  .subtitle {
    text-align: center;
    color: #e2c275;
    font-size: 15px;
    line-height: 1.6;
    margin-top: -6px;
    font-weight: 700;
    letter-spacing: 0.4px;
  }

  .auth-card {
    padding: 18px 16px 16px;
    border-radius: 16px;
    box-shadow: 0 14px 28px rgba(0, 0, 0, 0.25);
  }

  .auth-form {
    display: grid;
    gap: 14px;
  }

  .form-message {
    min-height: 18px;
    font-size: 12px;
    color: #ff7a7a;
    text-align: center;
  }

  .auth-footer {
    text-align: center;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .auth-footer a {
    color: var(--accent-gold);
    text-decoration: none;
    font-weight: 600;
  }

  @media (max-width: 520px) {
    body {
      padding: 0 10px;
    }

    .wrap {
      padding: 28px 16px 32px;
      box-shadow: 0 0 20px rgba(0,0,0,0.35);
    }
  }

  @media (max-width: 360px) {
    body {
      padding: 0 8px;
    }

    h1 {
      font-size: 24px;
    }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="top-row">
      <a
        class="back-link"
        href="partner-otp.html"
        aria-label="Back"
        onclick="if (window.history.length > 1) { event.preventDefault(); window.history.back(); }"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 12H5"></path>
          <path d="M12 19l-7-7 7-7"></path>
        </svg>
      </a>
    </div>

    <div class="logo">
      <img src="image/bg-eress-logo.png" alt="Ustra Logo">
    </div>

    <h1>New Password</h1>
    <p class="subtitle">Create a new password</p>

    <div class="glass-panel auth-card">
      <form class="auth-form" id="resetForm">
        <div>
          <input id="password" type="password" class="glass-input" placeholder="New Password" autocomplete="new-password" required>
        </div>
        <div>
          <input id="confirm" type="password" class="glass-input" placeholder="Confirm Password" autocomplete="new-password" required>
        </div>
        <div class="form-message" id="formMessage" aria-live="polite"></div>

        <button class="btn-primary" type="submit">Update Password</button>
      </form>
    </div>

    <div class="auth-footer">
      Back to <a href="partner-login.html">Log In</a>
    </div>
  </div>

  <script>
    (function () {
      const form = document.getElementById("resetForm");
      const password = document.getElementById("password");
      const confirm = document.getElementById("confirm");
      const formMessage = document.getElementById("formMessage");

      form.addEventListener("submit", function (event) {
        event.preventDefault();
        formMessage.textContent = "";
        if (password.value !== confirm.value) {
          formMessage.textContent = "Passwords do not match.";
          confirm.focus();
          return;
        }
        window.location.href = "partner-login.html";
      });
    })();
  </script>
</body>
</html>
