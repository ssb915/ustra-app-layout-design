<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustra Partner - Dashboard</title>

<style>
  /* 🔥 RESET & BASE STYLES */
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { background-color: #f4f4f4; display: flex; justify-content: center; }

  /* 🔥 APP CONTAINER */
  .app-container {
    width: 100%; max-width: 480px; background-color: #f9f9f9; min-height: 100dvh;
    position: relative; padding-bottom: 80px; box-shadow: 0 0 20px rgba(0,0,0,0.1); overflow-x: hidden;
  }

  /* 🔥 HEADER (Updated to center content by hiding actions) */
  header {
    padding: 20px; background: #fff; position: sticky; top: 0; z-index: 10;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid #eaeaea;
  }
  .salon-info h1 { font-size: 20px; font-weight: 700; color: #000; }
  .salon-info p { font-size: 12px; color: #666; }
  
  /* Hiding notifications as requested */
  .header-actions { display: none; } 

  /* 🔥 DASHBOARD STATS GRID */
  .dashboard-content { padding: 20px; }
  
  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;
  }
  .stat-card {
    background: #fff; padding: 20px 15px; border-radius: 16px; border: 1px solid #eaeaea;
    display: flex; flex-direction: column; align-items: flex-start;
  }
  .stat-card .icon-wrap {
    background: #f4f4f5; padding: 10px; border-radius: 12px; margin-bottom: 15px;
  }
  .stat-card h3 { font-size: 22px; font-weight: 700; color: #000; margin-bottom: 4px; }
  .stat-card p { font-size: 12px; color: #666; font-weight: 500; }

  /* 🔥 RECENT BOOKINGS SECTION */
  .section-title {
    font-size: 18px; font-weight: 700; color: #000; margin-bottom: 15px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .section-title a { font-size: 12px; color: #666; text-decoration: none; font-weight: 500; }

  .recent-booking-card {
    background: #fff; border: 1px solid #eaeaea; border-radius: 16px;
    padding: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 12px;
    position: relative; /* For absolutely positioned new tag */
  }
  .customer-avatar {
    width: 45px; height: 45px; background: #000; color: #fff; border-radius: 50%;
    display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px;
  }
  .booking-info { flex: 1; }
  .booking-info h4 { font-size: 15px; color: #000; margin-bottom: 3px; }
  .booking-info p { font-size: 12px; color: #666; }
  
  .time-badge {
    background: #f4f4f5; font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 8px;
  }

  /* 🔥 NEW Tag Badge Style */
  .new-tag-badge {
    position: absolute; top: -8px; right: 15px; 
    background: #d32f2f; color: #fff; font-size: 10px; font-weight: bold;
    padding: 3px 8px; border-radius: 10px; text-transform: uppercase;
    box-shadow: 0 2px 5px rgba(211,47,47,0.3);
  }

  /* 🔥 5-TAB BLACK NAVBAR */
  .bottom-nav {
    position: fixed; bottom: 0; width: 100%; max-width: 480px; background: black;
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 10px; height: 75px; z-index: 100;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-decoration: none; color: grey; transition: all 0.2s ease;
    width: 20%; height: 100%; border-radius: 12px;
  }
  .nav-item:active { background-color: #222; }
  .nav-item.active, .nav-item:hover { color: white; }
  
  .nav-item .lucide {
    width: 22px; height: 22px; stroke-width: 1.5px; margin-bottom: 4px; transition: stroke-width 0.2s ease;
  }
  .nav-item.active .lucide { stroke-width: 2.5px; }
  
  .nav-item span { font-size: 10px; font-weight: 500; }
  .nav-item.active span { font-weight: 600; }
</style>

<script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<div class="app-container">

  <header>
    <div class="salon-info">
      <h1>Urban Trim Salon</h1>
      <p>Dashboard</p>
    </div>
    <div class="header-actions">
      <i data-lucide="bell"></i>
      <div class="notification-dot"></div>
    </div>
  </header>

  <div class="dashboard-content">
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="icon-wrap"><i data-lucide="indian-rupee" style="width:20px; stroke: #000;"></i></div>
        <h3>₹4,500</h3>
        <p>Today's Revenue</p>
      </div>
      <div class="stat-card">
        <div class="icon-wrap"><i data-lucide="users" style="width:20px; stroke: #000;"></i></div>
        <h3>12</h3>
        <p>Today's Bookings</p>
      </div>
    </div>

    <div class="section-title">
      <span>Upcoming Appointments</span>
      <a href="partner-bookings.html">View All</a>
    </div>

    <div class="recent-booking-card">
      <div class="new-tag-badge">New</div>
      <div class="customer-avatar">A</div>
      <div class="booking-info">
        <h4>Aman Sharma</h4>
        <p>Haircut & Styling • ₹350</p>
      </div>
      <div class="time-badge">10:30 AM</div>
    </div>

    <div class="recent-booking-card">
      <div class="customer-avatar">R</div>
      <div class="booking-info">
        <h4>Rahul Verma</h4>
        <p>Beard Trim • ₹150</p>
      </div>
      <div class="time-badge">11:15 AM</div>
    </div>
    
  </div>

  <nav class="bottom-nav">
    <a href="partner-dashboard.html" class="nav-item active">
      <i data-lucide="layout-dashboard"></i><span>Dashboard</span>
    </a>
    <a href="partner-bookings.html" class="nav-item"> 
      <i data-lucide="calendar-check-2"></i><span>Bookings</span>
    </a>
    <a href="partner-services.html" class="nav-item">
      <i data-lucide="scissors"></i><span>Services</span>
    </a>
    <a href="partner-staff.html" class="nav-item">
      <i data-lucide="users-round"></i><span>Staff</span>
    </a>
    <a href="partner-profile.html" class="nav-item">
      <i data-lucide="store"></i><span>Profile</span>
    </a>
  </nav>

</div>

<script>
  lucide.createIcons();
</script>

</body>
</html>
