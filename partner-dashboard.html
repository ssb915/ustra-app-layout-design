<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustra Partner - Dashboard</title>
<link rel="stylesheet" href="customer-style.css">
<style>
  .salon-info h1 { font-size: 20px; font-weight: 700; color: var(--text-primary); }
  .salon-info p { font-size: 12px; color: var(--accent-gold); }
  
  .header-actions { display: none; } 

  .dashboard-content { padding: 20px; padding-bottom: 100px; }
  
  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;
  }
  .stat-card {
    background: var(--glass-bg); padding: 20px 15px; border-radius: 16px; border: 1px solid var(--glass-border);
    display: flex; flex-direction: column; align-items: flex-start;
  }
  .stat-card .icon-wrap {
    background: rgba(212,175,55,0.1); padding: 10px; border-radius: 12px; margin-bottom: 15px;
    border: 1px solid rgba(212,175,55,0.3);
  }
  .stat-card h3 { font-size: 22px; font-weight: 700; color: var(--accent-gold); margin-bottom: 4px; }
  .stat-card p { font-size: 12px; color: var(--text-secondary); font-weight: 500; }

  .section-title {
    font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 15px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .section-title a { font-size: 12px; color: var(--accent-gold); text-decoration: none; font-weight: 500; }

  .recent-booking-card {
    background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px;
    padding: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 12px;
    position: relative; transition: 0.2s;
  }
  .recent-booking-card:hover { border-color: var(--accent-gold); }
  
  .customer-avatar {
    width: 45px; height: 45px; background: linear-gradient(135deg, var(--accent-gold), #b58c16); color: #000;
    border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px;
  }
  .booking-info { flex: 1; }
  .booking-info h4 { font-size: 15px; color: var(--text-primary); margin-bottom: 3px; }
  .booking-info p { font-size: 12px; color: var(--text-secondary); }
  
  .time-badge {
    background: rgba(255,255,255,0.1); color: var(--text-primary);
    font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 8px; border: 1px solid var(--glass-border);
  }

  .new-tag-badge {
    position: absolute; top: -8px; right: 15px; 
    background: var(--error-color); color: #fff; font-size: 10px; font-weight: bold;
    padding: 3px 8px; border-radius: 10px; text-transform: uppercase;
    box-shadow: 0 2px 5px rgba(255,77,77,0.3);
  }
</style>
</head>
<body>

<div class="app-container">

  <header>
    <div class="salon-info">
      <h1><img src="image/bg-eress-logo.png" alt="Logo" class="top-logo" style="margin-right: 10px; vertical-align: middle;"> Urban Trim Salon</h1>
      <p>Dashboard Overview</p>
    </div>
    <div class="header-actions">
      <i data-lucide="bell"></i>
    </div>
  </header>

  <div class="dashboard-content">
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="icon-wrap"><i data-lucide="indian-rupee" style="width:20px; color: var(--accent-gold);"></i></div>
        <h3>$450</h3>
        <p>Today's Revenue</p>
      </div>
      <div class="stat-card">
        <div class="icon-wrap"><i data-lucide="users" style="width:20px; color: var(--accent-gold);"></i></div>
        <h3>12</h3>
        <p>Today's Bookings</p>
      </div>
    </div>

    <div class="section-title">
      <span>Upcoming Appointments</span>
      <a href="partner-bookings.html">View All</a>
    </div>

    <div class="recent-booking-card">
      <div class="new-tag-badge">New</div>
      <div class="customer-avatar">A</div>
      <div class="booking-info">
        <h4>Aman Sharma</h4>
        <p>Haircut & Styling • $35</p>
      </div>
      <div class="time-badge">10:30 AM</div>
    </div>

    <div class="recent-booking-card">
      <div class="customer-avatar">R</div>
      <div class="booking-info">
        <h4>Rahul Verma</h4>
        <p>Beard Trim • $15</p>
      </div>
      <div class="time-badge">11:15 AM</div>
    </div>
    
  </div>

  <nav class="bottom-nav">
    <a href="partner-dashboard.html" class="nav-item active">
      <i data-lucide="layout-dashboard"></i><span>Dashboard</span>
    </a>
    <a href="partner-bookings.html" class="nav-item"> 
      <i data-lucide="calendar"></i><span>Bookings</span>
    </a>
    <a href="partner-services.html" class="nav-item">
      <i data-lucide="scissors"></i><span>Services</span>
    </a>
    <a href="partner-staff.html" class="nav-item">
      <i data-lucide="users-round"></i><span>Staff</span>
    </a>
    <a href="partner-profile.html" class="nav-item">
      <i data-lucide="store"></i><span>Profile</span>
    </a>
  </nav>

</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
  lucide.createIcons();
</script>
<script>
  window.ustraHeaderConfig = { addTopOffset: true };
</script>
<script src="shared-home-header.js"></script>

</body>
</html>
