<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partner Registration</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(180deg,#1f1f1f,#141414);
  color: #fff;
}

.container {
  width: 100%;
  max-width: 400px;
  margin: auto;
  padding: 20px;
  box-sizing: border-box;
}

.logo-box {
  width: 120px;
  height: 120px;
  margin: 30px auto;
  background: #fff;
  border-radius: 25px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.logo {
  width: 100%;
  transform: scale(1.5) translateY(6px);
}

.step { display: none; }
.step.active { display: block; }

h2 { margin-bottom: 15px; }

.input-box {
  margin-bottom: 12px;
}

.input-box input {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.05);
  background: rgba(255,255,255,0.06);
  color: #fff;
  outline: none;

  box-sizing: border-box;   /* 🔥 MAIN FIX */
  display: block;           /* 🔥 stability */
}
.otp-box {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 12px;
}

.otp-box input {
  width: 100%;
  height: 50px;
  text-align: center;
  font-size: 18px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.05);
  background: rgba(255,255,255,0.06);
  color: #fff;
  outline: none;
}

.btn {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  background: #fff;
  color: #000;
  font-weight: bold;
  cursor: pointer;
}

.info {
  font-size: 13px;
  color: #aaa;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <div class="logo-box">
    <img src="image/bg-eress-logo.png" class="logo">
  </div>

  <!-- STEP 1 -->
  <div class="step active" id="step1">
    <h2>Basic Info</h2>

    <div class="input-box">
      <input type="text" placeholder="Owner Full Name">
    </div>

    <div class="input-box">
      <input type="text" placeholder="Gmail Address">
    </div>

    <div class="input-box">
      <input type="tel" placeholder="Mobile Number">
    </div>

    <button class="btn" onclick="nextStep(2)">Next</button>
  </div>

	<!-- STEP 2 -->
	<div class="step" id="step2">
	  <h2>Shop Details</h2>

	  <div class="input-box">
		<input type="text" placeholder="Shop Name">
	  </div>

	  <div class="input-box">
		<input type="file">
	  </div>

	  <!-- 🔥 TIME SECTION -->
	  <div style="margin-top: 10px; margin-bottom: 5px; font-size: 13px; color: #aaa;">
		Working Hours
	  </div>

	  <div style="display: flex; gap: 10px;">

		<!-- OPEN -->
		<div class="input-box" style="flex:1;">
		  <input type="time">
		</div>

		<!-- CLOSE -->
		<div class="input-box" style="flex:1;">
		  <input type="time">
		</div>

	  </div>

	  <button class="btn" onclick="nextStep(3)">Next</button>
	</div>

  <!-- STEP 3 -->
  <div class="step" id="step3">
    <h2>Location</h2>

    <div class="input-box">
      <input type="text" value="Your Location" readonly>
    </div>

    <button class="btn" onclick="nextStep(4)">Next</button>
  </div>

  <!-- STEP 4 OTP -->
  <div class="step" id="step4">
    <h2>Verify OTP</h2>

    <!-- 🔥 MESSAGE -->
    <div class="info">OTP has been sent to your Gmail</div>

    <div class="otp-box">
	  <input type="text" maxlength="1">
	  <input type="text" maxlength="1">
	  <input type="text" maxlength="1">
	  <input type="text" maxlength="1">
	  <input type="text" maxlength="1">
	  <input type="text" maxlength="1">
	</div>

    <button class="btn" onclick="goHome()">Verify</button>
  </div>

</div>

<script>
function nextStep(step) {
  document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
  document.getElementById("step" + step).classList.add("active");
}

/* 🔥 DIRECT HOME REDIRECT */
function goHome() {
  alert("Registration Successful 🚀");
  window.location.href = "partner-dashboard.html"; // 👈 apna home page
}
</script>

</body>
</html>
