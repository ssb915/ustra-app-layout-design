<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustra - Login</title>
<link rel="stylesheet" href="customer-style.css">
<style>
  body {
    background: var(--bg-darker);
    color: var(--text-primary);
    margin: 0;
    min-height: 100dvh;
    padding: 20px 16px 32px;
    display: flex;
    justify-content: center;
  }

  .wrap {
    width: min(520px, 100%);
    padding: 26px 16px 32px;
    display: grid;
    align-content: start;
    gap: 18px;
  }

  .logo {
    width: 110px;
    height: 110px;
    border-radius: 22px;
    background: #fff;
    display: grid;
    place-items: center;
    box-shadow: 0 14px 28px rgba(0, 0, 0, 0.25);
    margin: 5px auto 14px;
  }

  .logo img {
    width: 75%;
    height: 100%;
    object-fit: contain;
    filter: none;
  }

  h1 {
    font-size: 35px;
    text-align: center;
    margin-top: 4px;
    font-weight: 800;
    letter-spacing: 0.2px;
  }

  .subtitle {
    text-align: center;
    color: #e2c275;
    font-size: 15px;
    line-height: 1.6;
    margin-top: -6px;
    font-weight: 700;
    letter-spacing: 0.4px;
  }

  .auth-card {
    padding: 18px 16px 16px;
    border-radius: 16px;
    box-shadow: 0 14px 28px rgba(0, 0, 0, 0.25);
  }

  .auth-form {
    display: grid;
    gap: 14px;
  }

  .forgot-password {
    justify-self: end;
    font-size: 13px;
    color: var(--accent-gold);
    text-decoration: none;
    font-weight: 600;
    margin-top: -6px;
  }

  .auth-footer {
    text-align: center;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .auth-footer a {
    color: var(--accent-gold);
    text-decoration: none;
    font-weight: 600;
  }

  @media (max-width: 520px) {
    body {
      padding: 0 10px;
    }

    .wrap {
      padding: 28px 16px 32px;
      box-shadow: 0 0 20px rgba(0,0,0,0.35);
    }
  }

  @media (max-width: 360px) {
    body {
      padding: 0 8px;
    }

    h1 {
      font-size: 24px;
    }
  }
</style>

</head>
<body>

<div class="wrap">
  <div class="logo">
    <img src="image/bg-eress-logo.png" alt="Ustra Logo">
  </div>

  <h1>Welcome Back</h1>
  <p class="subtitle">Sign in to continue</p>

  <div class="glass-panel auth-card">
    <form class="auth-form" onsubmit="event.preventDefault(); window.location.href='home.html';">
      <div>
        <input type="text" class="glass-input" placeholder="Email or Phone Number" autocomplete="username">
      </div>
      <div>
        <input type="password" class="glass-input" placeholder="Password" autocomplete="current-password">
      </div>

      <a href="customer-forgot-password.html" class="forgot-password">Forgot Password?</a>

      <button class="btn-primary" type="submit">Login</button>
    </form>
  </div>

  <div class="auth-footer">
    Don't have an account? <a href="customer-register.html">Sign Up</a>
  </div>
</div>

</body>
</html>
