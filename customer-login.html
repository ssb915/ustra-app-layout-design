<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustra - Login</title>
<link rel="stylesheet" href="customer-style.css">
<style>
  .auth-container {
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    height: 100%;
    justify-content: center;
    margin-top: 50px;
  }
  .auth-header {
    text-align: center;
    margin-bottom: 40px;
  }
  .auth-header h1 {
    font-size: 32px;
    margin-bottom: 10px;
  }
  .auth-form {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .forgot-password {
    text-align: right;
    font-size: 14px;
    color: var(--accent-gold);
    text-decoration: none;
    margin-top: -10px;
    display: block;
  }
  .divider {
    display: flex;
    align-items: center;
    text-align: center;
    margin: 30px 0;
    color: var(--text-secondary);
    font-size: 14px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    border-bottom: 1px solid var(--glass-border);
  }
  .divider:not(:empty)::before { margin-right: .25em; }
  .divider:not(:empty)::after { margin-left: .25em; }
  
  .social-login {
    display: flex;
    gap: 15px;
  }
  .btn-social {
    flex: 1;
    padding: 12px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: 0.3s ease;
  }
  .btn-social:hover {
    background: rgba(255,255,255,0.1);
  }
  .btn-social img {
    width: 24px;
    height: 24px;
  }
  .auth-footer {
    text-align: center;
    margin-top: 40px;
    font-size: 14px;
    color: var(--text-secondary);
  }
  .auth-footer a {
    color: var(--accent-gold);
    text-decoration: none;
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="app-container">
  <header style="border-bottom: none;">
    <a href="index.html" style="text-decoration: none;">
      <i data-lucide="arrow-left"></i>
    </a>
  </header>

  <div class="auth-container">
    <div class="auth-header">
      <h1><img src="image/bg-eress-logo.png" alt="Logo" class="top-logo" style="margin-right: 10px; vertical-align: middle;"> Welcome Back</h1>
      <p class="text-muted">Sign in to continue to Ustra</p>
    </div>

    <form class="auth-form" onsubmit="event.preventDefault(); window.location.href='home.html';">
      <div>
        <input type="email" class="glass-input" placeholder="Email or Phone Number">
      </div>
      <div>
        <input type="password" class="glass-input" placeholder="Password">
      </div>
      
      <a href="#" class="forgot-password">Forgot Password?</a>
      
      <button class="btn-primary mt-10">Login</button>
    </form>

    <div class="divider">or continue with</div>

    <div class="social-login">
      <div class="btn-social">
        <img src="https://img.icons8.com/color/48/google-logo.png" alt="Google">
      </div>
      <div class="btn-social">
        <img src="https://img.icons8.com/ios-filled/50/ffffff/apple-logo.png" alt="Apple">
      </div>
    </div>

    <div class="auth-footer">
      Don't have an account? <a href="customer-register.html">Sign Up</a>
    </div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
  lucide.createIcons();
</script>
</body>
</html>
