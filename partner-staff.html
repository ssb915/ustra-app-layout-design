<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustra Partner - Staff</title>

<style>
  /* 🔥 RESET & BASE STYLES */
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { background-color: #f4f4f4; display: flex; justify-content: center; }

  /* 🔥 APP CONTAINER */
  .app-container {
    width: 100%; max-width: 480px; background-color: #f9f9f9; min-height: 100dvh;
    position: relative; padding-bottom: 80px; box-shadow: 0 0 20px rgba(0,0,0,0.1); overflow-x: hidden;
  }

  /* 🔥 HEADER */
  header {
    padding: 20px; background: #fff; position: sticky; top: 0; z-index: 10;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid #eaeaea;
  }
  header h1 { font-size: 22px; font-weight: 700; color: #000; }
  .add-btn { 
    background: #000; color: #fff; border: none; padding: 8px 15px; 
    border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 5px;
  }

  /* 🔥 STAFF LIST */
  .staff-content { padding: 20px; }

  .staff-card {
    background: #fff; border: 1px solid #eaeaea; border-radius: 16px;
    padding: 16px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px;
  }
  
  .staff-avatar {
    width: 55px; height: 55px; background: #000; color: #fff; border-radius: 50%;
    display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold;
  }
  
  .staff-info { flex: 1; }
  .staff-info h3 { font-size: 16px; color: #000; margin-bottom: 3px; }
  .staff-info p { font-size: 13px; color: #666; }
  .rating { font-size: 12px; color: #000; font-weight: 600; display: flex; align-items: center; gap: 4px; margin-top: 4px; display:none}

  /* Wrapper for actions (switch + edit) */
  .staff-actions {
    display: flex; align-items: center; gap: 10px;
  }

  /* 🔥 NEW Pencil Edit Icon Style */
  .edit-pencil {
    cursor: pointer; color: #aaaaaa; transition: 0.2s;
    width: 35px; height: 35px; background: #f8f8f8; border: 1px solid #eaeaea; border-radius: 10px;
    display: flex; justify-content: center; align-items: center;
  }
  .edit-pencil:hover { color: #000; border-color: #aaa; background: #f0f0f0; }

  /* Custom Toggle Switch */
  .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { 
    position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; 
    background-color: #ccc; transition: .4s; border-radius: 24px;
  }
  .slider:before { 
    position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; 
    background-color: white; transition: .4s; border-radius: 50%;
  }
  input:checked + .slider { background-color: #000; }
  input:checked + .slider:before { transform: translateX(20px); }

  /* 🔥 5-TAB BLACK NAVBAR */
  .bottom-nav {
    position: fixed; bottom: 0; width: 100%; max-width: 480px; background: black;
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 10px; height: 75px; z-index: 100;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-decoration: none; color: grey; transition: all 0.2s ease;
    width: 20%; height: 100%; border-radius: 12px;
  }
  .nav-item:active { background-color: #222; }
  .nav-item.active, .nav-item:hover { color: white; }
  .nav-item .lucide { width: 22px; height: 22px; stroke-width: 1.5px; margin-bottom: 4px; }
  .nav-item.active .lucide { stroke-width: 2.5px; }
  .nav-item span { font-size: 10px; font-weight: 500; }
  .nav-item.active span { font-weight: 600; }
</style>

<script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<div class="app-container">

  <header>
    <h1>Staff Members</h1>
    <button class="add-btn">
      <i data-lucide="plus" style="width: 16px;"></i> Add New
    </button>
  </header>

  <div class="staff-content">
    
    <div class="staff-card">
      <div class="staff-avatar">R</div>
      <div class="staff-info">
        <h3>Rahul Verma</h3>
        <p>Senior Stylist</p>
        <div class="rating"><i data-lucide="star" style="width: 12px; fill: #fbbf24; stroke: none;"></i> 4.8</div>
      </div>
      <div class="staff-actions">
        <div class="edit-pencil">
          <i data-lucide="pencil" style="width: 16px;"></i>
        </div>
        <label class="switch">
          <input type="checkbox" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="staff-card">
      <div class="staff-avatar" style="background: #333;">V</div>
      <div class="staff-info">
        <h3>Vikash Singh</h3>
        <p>Barber & Massage Expert</p>
        <div class="rating"><i data-lucide="star" style="width: 12px; fill: #fbbf24; stroke: none;"></i> 4.5</div>
      </div>
      <div class="staff-actions">
        <div class="edit-pencil">
          <i data-lucide="pencil" style="width: 16px;"></i>
        </div>
        <label class="switch">
          <input type="checkbox" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="staff-card" style="opacity: 0.6;">
      <div class="staff-avatar" style="background: #ccc; color: #333;">A</div>
      <div class="staff-info">
        <h3>Amit Kumar</h3>
        <p>Junior Barber</p>
        <div class="rating" style="color: #666;"><i data-lucide="star" style="width: 12px; fill: #ccc; stroke: none;"></i> New</div>
      </div>
      <div class="staff-actions">
        <div class="edit-pencil">
          <i data-lucide="pencil" style="width: 16px;"></i>
        </div>
        <label class="switch">
          <input type="checkbox">
          <span class="slider"></span>
        </label>
      </div>
    </div>

  </div>

  <nav class="bottom-nav">
    <a href="partner-dashboard.html" class="nav-item">
      <i data-lucide="layout-dashboard"></i><span>Dashboard</span>
    </a>
    <a href="partner-bookings.html" class="nav-item"> 
      <i data-lucide="calendar-check-2"></i><span>Bookings</span>
    </a>
    <a href="partner-services.html" class="nav-item">
      <i data-lucide="scissors"></i><span>Services</span>
    </a>
    <a href="partner-staff.html" class="nav-item active">
      <i data-lucide="users-round"></i><span>Staff</span>
    </a>
    <a href="partner-profile.html" class="nav-item">
      <i data-lucide="store"></i><span>Profile</span>
    </a>
  </nav>

</div>

<script>
  lucide.createIcons();
</script>

</body>
</html>
