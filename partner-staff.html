<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustra Partner - Staff</title>
<link rel="stylesheet" href="customer-style.css">
<style>
  .staff-container { padding: 20px; padding-bottom: 100px; }
  
  .add-btn { margin-bottom: 25px; padding: 15px; border-radius: 12px; background: rgba(212,175,55,0.1); border: 1px dashed var(--accent-gold); color: var(--accent-gold); text-align: center; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;}

  .staff-card {
    background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px;
    padding: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 12px; position: relative;
  }
  .staff-avatar {
    width: 50px; height: 50px; background-size: cover; background-position: center; border-radius: 50%;
    border: 2px solid var(--accent-gold); flex-shrink: 0;
  }
  .staff-info { flex: 1; }
  .staff-info h4 { font-size: 16px; color: var(--text-primary); margin-bottom: 3px; }
  .staff-info p { font-size: 13px; color: var(--text-secondary); }
  
  .badge { font-size: 10px; font-weight: bold; padding: 3px 8px; border-radius: 8px; text-transform: uppercase; background: rgba(0,204,102,0.1); color: var(--success-color); }
  .badge.busy { background: rgba(255,77,77,0.1); color: var(--error-color); }

  .more-btn { color: var(--text-secondary); cursor: pointer; padding: 5px; }
  .more-btn:hover { color: var(--accent-gold); }
</style>
</head>
<body>

<div class="app-container">

  <header>
    <h1><img src="image/bg-eress-logo.png" alt="Logo" class="top-logo" style="margin-right: 10px; vertical-align: middle;"> Staff Members</h1>
    <i data-lucide="user-plus"></i>
  </header>

  <div class="staff-container">
    <div class="add-btn">
      <i data-lucide="plus"></i> Add Staff Member
    </div>

    <div class="staff-card">
      <div class="staff-avatar" style="background-image: url('https://images.unsplash.com/photo-1544723795-3ca315cadc88?auto=format&fit=crop&w=150&q=80');"></div>
      <div class="staff-info">
        <h4>Samir Patel (Owner)</h4>
        <p>Master Barber</p>
      </div>
      <div class="badge">Available</div>
      <i data-lucide="more-vertical" class="more-btn"></i>
    </div>

    <div class="staff-card">
      <div class="staff-avatar" style="background-image: url('https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&w=150&q=80');"></div>
      <div class="staff-info">
        <h4>Marcus Johnson</h4>
        <p>Senior Stylist</p>
      </div>
      <div class="badge busy">Busy</div>
      <i data-lucide="more-vertical" class="more-btn"></i>
    </div>

    <div class="staff-card">
      <div class="staff-avatar" style="background-image: url('https://images.unsplash.com/photo-1599566150163-29194dcaad36?auto=format&fit=crop&w=150&q=80');"></div>
      <div class="staff-info">
        <h4>John Doe</h4>
        <p>Skin Specialist</p>
      </div>
      <div class="badge">Available</div>
      <i data-lucide="more-vertical" class="more-btn"></i>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="partner-dashboard.html" class="nav-item">
      <i data-lucide="layout-dashboard"></i><span>Dashboard</span>
    </a>
    <a href="partner-bookings.html" class="nav-item"> 
      <i data-lucide="calendar"></i><span>Bookings</span>
    </a>
    <a href="partner-services.html" class="nav-item">
      <i data-lucide="scissors"></i><span>Services</span>
    </a>
    <a href="partner-staff.html" class="nav-item active">
      <i data-lucide="users-round"></i><span>Staff</span>
    </a>
    <a href="partner-profile.html" class="nav-item">
      <i data-lucide="store"></i><span>Profile</span>
    </a>
  </nav>

</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
  lucide.createIcons();
</script>
<script>
  window.ustraHeaderConfig = { addTopOffset: true };
</script>
<script src="shared-home-header.js"></script>

</body>
</html>
