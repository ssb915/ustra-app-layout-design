<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - Barber Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root { --primary: #1e40af; --surface: #fafafa; }
    body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--surface); -webkit-tap-highlight-color: transparent; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="pb-24">

  <div class="max-w-md mx-auto min-h-screen bg-white shadow-sm">
    
    <header class="bg-white px-4 pt-5 pb-3 sticky top-0 z-40 border-b border-zinc-100">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <h1 class="text-xl font-bold text-zinc-900 tracking-tight">My Profile</h1>
        </div>
        <button onclick="toggleDrawer()" class="w-9 h-9 rounded-full bg-zinc-50 flex items-center justify-center border border-zinc-200 hover:bg-zinc-100 transition-colors">
          <i data-lucide="menu" class="w-5 h-5 text-zinc-700"></i>
        </button>
      </div>
    </header>

    <main class="px-4 py-6 space-y-6">

      <div class="bg-blue-800 rounded-3xl p-6 text-center relative overflow-hidden shadow-lg shadow-blue-900/20">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-blue-400/20 rounded-full blur-2xl"></div>
        
        <div class="relative z-10">
          <div class="w-20 h-20 mx-auto bg-white rounded-full p-1 mb-3">
            <div class="w-full h-full bg-zinc-200 rounded-full flex items-center justify-center overflow-hidden">
              <i data-lucide="user" class="w-8 h-8 text-zinc-400"></i>
            </div>
          </div>
          <h2 class="text-xl font-bold text-white">Arjun</h2>
          <p class="text-blue-100 text-sm mt-1">+91 98765 43210</p>
          <button class="mt-4 px-4 py-1.5 bg-white/20 hover:bg-white/30 text-white text-xs font-medium rounded-full backdrop-blur-sm transition-colors border border-white/10">
            Edit Profile
          </button>
        </div>
      </div>

      <div class="bg-white border border-zinc-100 rounded-2xl p-2 shadow-sm">
        <button class="w-full flex items-center justify-between p-3 rounded-xl hover:bg-zinc-50 transition-colors group">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center group-hover:bg-blue-100 transition-colors">
              <i data-lucide="heart" class="w-5 h-5 text-blue-800"></i>
            </div>
            <span class="font-medium text-zinc-800 text-sm">Saved Salons</span>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-zinc-400"></i>
        </button>

        <button class="w-full flex items-center justify-between p-3 rounded-xl hover:bg-zinc-50 transition-colors group">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-orange-50 flex items-center justify-center group-hover:bg-orange-100 transition-colors">
              <i data-lucide="bell" class="w-5 h-5 text-orange-600"></i>
            </div>
            <span class="font-medium text-zinc-800 text-sm">Notifications</span>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-zinc-400"></i>
        </button>
        
        <button class="w-full flex items-center justify-between p-3 rounded-xl hover:bg-zinc-50 transition-colors group">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-emerald-50 flex items-center justify-center group-hover:bg-emerald-100 transition-colors">
              <i data-lucide="credit-card" class="w-5 h-5 text-emerald-600"></i>
            </div>
            <span class="font-medium text-zinc-800 text-sm">Payment Methods</span>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-zinc-400"></i>
        </button>
      </div>

    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-zinc-100 px-8 py-3 z-30">
      <div class="max-w-md mx-auto flex justify-between items-center">
        <a href="index.html" class="flex flex-col items-center gap-1 cursor-pointer w-16 opacity-50 hover:opacity-100 transition-opacity">
          <i data-lucide="home" class="w-6 h-6 text-zinc-600"></i>
          <span class="text-[10px] font-medium text-zinc-600">Home</span>
        </a>
        <a href="bookings.html" class="flex flex-col items-center gap-1 cursor-pointer w-16 opacity-50 hover:opacity-100 transition-opacity">
          <i data-lucide="calendar" class="w-6 h-6 text-zinc-600"></i>
          <span class="text-[10px] font-medium text-zinc-600">Bookings</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center gap-1 cursor-pointer w-16">
          <i data-lucide="user" class="w-6 h-6 text-blue-800 fill-blue-50"></i>
          <span class="text-[10px] font-semibold text-blue-800">Profile</span>
        </a>
      </div>
    </div>

  </div>

  <div id="drawer-overlay" onclick="toggleDrawer()" class="fixed inset-0 bg-zinc-900/60 z-[60] opacity-0 pointer-events-none transition-opacity duration-300"></div>
  <div id="side-drawer" class="fixed top-0 right-0 h-full w-[80%] max-w-sm bg-white z-[70] transform translate-x-full transition-transform duration-300 shadow-2xl flex flex-col">
    <div class="px-6 py-5 border-b border-zinc-100 flex items-center justify-between bg-zinc-50">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-zinc-200 flex items-center justify-center">
          <i data-lucide="user" class="w-5 h-5 text-zinc-600"></i>
        </div>
        <div>
          <h3 class="font-bold text-zinc-900">Arjun</h3>
          <p class="text-xs text-zinc-500">+91 98765 43210</p>
        </div>
      </div>
      <button onclick="toggleDrawer()" class="p-2 bg-white rounded-full shadow-sm border border-zinc-200 hover:bg-zinc-100">
        <i data-lucide="x" class="w-4 h-4 text-zinc-600"></i>
      </button>
    </div>
    <div class="p-4 border-t border-zinc-100 mt-auto">
      <button onclick="toggleDrawer()" class="w-full flex items-center justify-center gap-2 p-3 bg-red-50 text-red-600 rounded-xl hover:bg-red-100 transition-colors font-medium text-sm">
        <i data-lucide="log-out" class="w-4 h-4"></i>Log Out
      </button>
    </div>
  </div>

  <script>
    function toggleDrawer() {
      const drawer = document.getElementById('side-drawer');
      const overlay = document.getElementById('drawer-overlay');
      drawer.classList.toggle('translate-x-full');
      if (overlay.classList.contains('opacity-0')) {
        overlay.classList.remove('opacity-0', 'pointer-events-none');
        overlay.classList.add('opacity-100');
      } else {
        overlay.classList.remove('opacity-100');
        overlay.classList.add('opacity-0', 'pointer-events-none');
      }
    }
    lucide.createIcons();
  </script>
</body>
</html>
