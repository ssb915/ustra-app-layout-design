<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustra Partner - Services</title>
<link rel="stylesheet" href="customer-style.css">
<style>
  .services-container { padding: 20px; padding-bottom: 100px; }
  
  .add-btn-wrapper { margin-bottom: 20px; }
  .btn-add {
    display: flex; justify-content: center; align-items: center; gap: 8px;
    width: 100%; padding: 15px; background: rgba(212,175,55,0.1); color: var(--accent-gold);
    border: 1px dashed var(--accent-gold); border-radius: 12px; font-weight: 600; cursor: pointer;
  }
  
  .category-title { font-size: 16px; font-weight: 700; color: var(--text-primary); margin: 20px 0 10px 0; }
  
  .service-item {
    background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px;
    padding: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
  }
  .service-info h4 { font-size: 15px; color: var(--text-primary); margin-bottom: 4px; }
  .service-info p { font-size: 12px; color: var(--text-secondary); }
  
  .service-actions { display: flex; align-items: center; gap: 15px; }
  .service-price { font-weight: 700; color: var(--accent-gold); font-size: 16px; }
  .action-icon { color: var(--text-secondary); cursor: pointer; }
  .action-icon:hover { color: var(--accent-gold); }
</style>
</head>
<body>

<div class="app-container">

  <header>
    <h1><img src="image/bg-eress-logo.png" alt="Logo" class="top-logo" style="margin-right: 10px; vertical-align: middle;"> Services</h1>
    <i data-lucide="plus"></i>
  </header>

  <div class="services-container">
    <div class="add-btn-wrapper">
      <button class="btn-add"><i data-lucide="plus"></i> Add New Service</button>
    </div>

    <div class="category-title">Hair Care</div>
    
    <div class="service-item">
      <div class="service-info">
        <h4>Classic Haircut</h4>
        <p>45 mins</p>
      </div>
      <div class="service-actions">
        <div class="service-price">$25</div>
        <i data-lucide="edit-2" class="action-icon" style="width:16px;"></i>
      </div>
    </div>
    
    <div class="service-item">
      <div class="service-info">
        <h4>Hair Styling & Wash</h4>
        <p>30 mins</p>
      </div>
      <div class="service-actions">
        <div class="service-price">$15</div>
        <i data-lucide="edit-2" class="action-icon" style="width:16px;"></i>
      </div>
    </div>

    <div class="category-title">Beard Grooming</div>
    
    <div class="service-item">
      <div class="service-info">
        <h4>Beard Trim</h4>
        <p>20 mins</p>
      </div>
      <div class="service-actions">
        <div class="service-price">$12</div>
        <i data-lucide="edit-2" class="action-icon" style="width:16px;"></i>
      </div>
    </div>
    
    <div class="service-item">
      <div class="service-info">
        <h4>Classic Wet Shave</h4>
        <p>30 mins</p>
      </div>
      <div class="service-actions">
        <div class="service-price">$20</div>
        <i data-lucide="edit-2" class="action-icon" style="width:16px;"></i>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="partner-dashboard.html" class="nav-item">
      <i data-lucide="layout-dashboard"></i><span>Dashboard</span>
    </a>
    <a href="partner-bookings.html" class="nav-item"> 
      <i data-lucide="calendar"></i><span>Bookings</span>
    </a>
    <a href="partner-services.html" class="nav-item active">
      <i data-lucide="scissors"></i><span>Services</span>
    </a>
    <a href="partner-staff.html" class="nav-item">
      <i data-lucide="users-round"></i><span>Staff</span>
    </a>
    <a href="partner-profile.html" class="nav-item">
      <i data-lucide="store"></i><span>Profile</span>
    </a>
  </nav>

</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
  lucide.createIcons();
</script>

</body>
</html>
