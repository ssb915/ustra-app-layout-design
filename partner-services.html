<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustra Partner - Services</title>

<style>
  /* 🔥 RESET & BASE STYLES */
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { background-color: #f4f4f4; display: flex; justify-content: center; }

  /* 🔥 APP CONTAINER */
  .app-container {
    width: 100%; max-width: 480px; background-color: #f9f9f9; min-height: 100dvh;
    position: relative; padding-bottom: 80px; box-shadow: 0 0 20px rgba(0,0,0,0.1); overflow-x: hidden;
  }

  /* 🔥 HEADER */
  header {
    padding: 20px; background: #fff; position: sticky; top: 0; z-index: 10;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid #eaeaea;
  }
  header h1 { font-size: 22px; font-weight: 700; color: #000; }
  .add-btn { 
    background: #000; color: #fff; border: none; padding: 8px 15px; 
    border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 5px;
  }

  /* 🔥 SERVICES LIST */
  .services-content { padding: 20px; }
  
  .category-title { font-size: 14px; color: #666; font-weight: 600; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.5px; }

  .service-card {
    background: #fff; border: 1px solid #eaeaea; border-radius: 16px;
    padding: 16px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;
    transition: 0.2s;
  }
  .service-card:hover { border-color: #000; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
  
  .service-info h3 { font-size: 16px; color: #000; margin-bottom: 4px; }
  .service-info p { font-size: 13px; color: #666; display: flex; align-items: center; gap: 10px; }
  .service-info p span { display: flex; align-items: center; gap: 4px; }
  
  .service-actions { display: flex; gap: 10px; }
  .action-icon {
    width: 35px; height: 35px; background: #f4f4f5; border-radius: 10px;
    display: flex; justify-content: center; align-items: center; cursor: pointer; color: #333;
  }
  .action-icon.edit:hover { background: #e0e0e0; color: #000; }

  /* 🔥 5-TAB BLACK NAVBAR */
  .bottom-nav {
    position: fixed; bottom: 0; width: 100%; max-width: 480px; background: black;
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 10px; height: 75px; z-index: 100;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-decoration: none; color: grey; transition: all 0.2s ease;
    width: 20%; height: 100%; border-radius: 12px;
  }
  .nav-item:active { background-color: #222; }
  .nav-item.active, .nav-item:hover { color: white; }
  .nav-item .lucide { width: 22px; height: 22px; stroke-width: 1.5px; margin-bottom: 4px; }
  .nav-item.active .lucide { stroke-width: 2.5px; }
  .nav-item span { font-size: 10px; font-weight: 500; }
  .nav-item.active span { font-weight: 600; }
</style>

<script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<div class="app-container">

  <header>
    <h1>Services</h1>
    <button class="add-btn">
      <i data-lucide="plus" style="width: 16px;"></i> Add New
    </button>
  </header>

  <div class="services-content">
    
    <div class="category-title">Hair</div>
    
    <div class="service-card">
      <div class="service-info">
        <h3>Classic Haircut</h3>
        <p>
          <span><i data-lucide="clock" style="width: 14px;"></i> 30 Min</span>
          <span><i data-lucide="indian-rupee" style="width: 14px;"></i> 250</span>
        </p>
      </div>
      <div class="service-actions">
        <div class="action-icon edit"><i data-lucide="pencil" style="width: 18px;"></i></div>
      </div>
    </div>

    <div class="service-card">
      <div class="service-info">
        <h3>Hair Coloring</h3>
        <p>
          <span><i data-lucide="clock" style="width: 14px;"></i> 60 Min</span>
          <span><i data-lucide="indian-rupee" style="width: 14px;"></i> 800</span>
        </p>
      </div>
      <div class="service-actions">
        <div class="action-icon edit"><i data-lucide="pencil" style="width: 18px;"></i></div>
      </div>
    </div>

    <div class="category-title" style="margin-top: 25px;">Beard & Face</div>

    <div class="service-card">
      <div class="service-info">
        <h3>Beard Styling & Trim</h3>
        <p>
          <span><i data-lucide="clock" style="width: 14px;"></i> 20 Min</span>
          <span><i data-lucide="indian-rupee" style="width: 14px;"></i> 150</span>
        </p>
      </div>
      <div class="service-actions">
        <div class="action-icon edit"><i data-lucide="pencil" style="width: 18px;"></i></div>
      </div>
    </div>

  </div>

  <nav class="bottom-nav">
    <a href="partner-dashboard.html" class="nav-item">
      <i data-lucide="layout-dashboard"></i><span>Dashboard</span>
    </a>
    <a href="partner-bookings.html" class="nav-item"> 
      <i data-lucide="calendar-check-2"></i><span>Bookings</span>
    </a>
    <a href="partner-services.html" class="nav-item active">
      <i data-lucide="scissors"></i><span>Services</span>
    </a>
    <a href="partner-staff.html" class="nav-item">
      <i data-lucide="users-round"></i><span>Staff</span>
    </a>
    <a href="partner-profile.html" class="nav-item">
      <i data-lucide="store"></i><span>Profile</span>
    </a>
  </nav>

</div>

<script>
  lucide.createIcons();
</script>

</body>
</html>
