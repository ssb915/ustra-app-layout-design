<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustra Partner - Profile</title>
<link rel="stylesheet" href="customer-style.css">
<style>
  .profile-header { text-align: center; padding: 20px 20px 10px 20px; }
  .profile-avatar {
    width: 90px; height: 90px;
    background: linear-gradient(135deg, var(--accent-gold), #b58c16); color: #000;
    border-radius: 50%; display: flex; justify-content: center; align-items: center;
    font-size: 32px; font-weight: bold; margin: 0 auto 15px auto;
    border: 3px solid var(--bg-dark); box-shadow: 0 0 0 2px var(--accent-gold);
  }
  .profile-header h2 { font-size: 22px; margin-bottom: 5px; color: var(--text-primary); }
  .profile-header p { color: var(--text-secondary); font-size: 14px; margin-bottom: 5px; }

  .profile-actions { display: flex; flex-direction: column; gap: 12px; padding: 20px; padding-bottom: 100px; }
  
  .action-btn {
    background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 16px 20px;
    border-radius: 12px; font-size: 15px; font-weight: 500; text-align: left;
    cursor: pointer; transition: 0.2s; color: var(--text-primary);
    display: flex; align-items: center; text-decoration: none;
  }
  .action-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--accent-gold); }
  .action-btn .icon { margin-right: 15px; color: var(--accent-gold); }
  .action-btn .chevron { margin-left: auto; color: var(--text-secondary); }

  .action-btn-logout {
    margin-top: 10px; background: rgba(255,77,77,0.1); color: var(--error-color);
    border-color: rgba(255,77,77,0.3); justify-content: center;
  }
  .action-btn-logout:hover { background: rgba(255,77,77,0.2); border-color: var(--error-color); }
</style>
</head>
<body>

<div class="app-container">

  <header>
    <h1><img src="image/bg-eress-logo.png" alt="Logo" class="top-logo" style="margin-right: 10px; vertical-align: middle;"> Salon Profile</h1>
    <i data-lucide="settings"></i>
  </header>

  <div class="profile-header">
    <div class="profile-avatar">U</div>
    <h2>Urban Trim Salon</h2>
    <p>urbantrim@example.com</p>
    <p>+91 9876543210</p>
  </div>

  <div class="profile-actions">
    <a href="#" class="action-btn">
      <i data-lucide="edit" class="icon"></i> Edit Business Details
      <i data-lucide="chevron-right" class="chevron"></i>
    </a>
    <a href="#" class="action-btn">
      <i data-lucide="map-pin" class="icon"></i> Location & Operating Hours
      <i data-lucide="chevron-right" class="chevron"></i>
    </a>
    <a href="#" class="action-btn">
      <i data-lucide="wallet" class="icon"></i> Payouts & Billing
      <i data-lucide="chevron-right" class="chevron"></i>
    </a>
    <a href="#" class="action-btn">
      <i data-lucide="star" class="icon"></i> Reviews & Ratings
      <i data-lucide="chevron-right" class="chevron"></i>
    </a>
    <a href="#" class="action-btn">
      <i data-lucide="message-square" class="icon"></i> Help & Support
      <i data-lucide="chevron-right" class="chevron"></i>
    </a>
    
    <a href="index.html" class="action-btn action-btn-logout">
      Log Out
    </a>
  </div>

  <nav class="bottom-nav">
    <a href="partner-dashboard.html" class="nav-item">
      <i data-lucide="layout-dashboard"></i><span>Dashboard</span>
    </a>
    <a href="partner-bookings.html" class="nav-item"> 
      <i data-lucide="calendar"></i><span>Bookings</span>
    </a>
    <a href="partner-services.html" class="nav-item">
      <i data-lucide="scissors"></i><span>Services</span>
    </a>
    <a href="partner-staff.html" class="nav-item">
      <i data-lucide="users-round"></i><span>Staff</span>
    </a>
    <a href="partner-profile.html" class="nav-item active">
      <i data-lucide="store"></i><span>Profile</span>
    </a>
  </nav>

</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
  lucide.createIcons();
</script>

</body>
</html>
