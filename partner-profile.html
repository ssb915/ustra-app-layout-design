<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ustra - Profile</title>
  <link rel="stylesheet" href="customer-style.css">
  <style>
    .app-container {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
      padding-bottom: 0;
    }

    .profile-page {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 72px 18px 188px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: 100%;
    }

    .profile-top-brand {
      position: fixed;
      top: 12px;
      left: 18px;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      pointer-events: none;
    }

    .profile-top-brand img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.18);
      pointer-events: auto;
    }

    .profile-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 12px 0 8px;
    }

    .profile-card {
      position: relative;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(24, 25, 30, 0.96) 0%, rgba(16, 17, 21, 0.98) 100%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        0 14px 30px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
      overflow: hidden;
    }

    .profile-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 18px;
      right: 18px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.14), transparent);
      pointer-events: none;
    }

    .profile-head-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .profile-avatar-wrap {
      position: relative;
      width: 100%;
      max-width: 360px;
      padding: 0;
      border-radius: 28px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.02) 100%);
      border: 1px solid #e2c275;
      box-shadow:
        0 14px 30px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .profile-avatar {
      width: 100%;
      height: 210px;
      border-radius: 0;
      display: block;
      object-fit: cover;
      border: none;
      background: #111;
      box-shadow: none;
      background-size: cover;
      background-position: center;
      flex-shrink: 0;
    }

    .profile-avatar-action {
      width: 100%;
      min-height: 50px;
      margin-top: 4px;
      padding: 0 16px;
      border-radius: 16px;
      border: 1px solid rgba(226, 194, 117, 0.18);
      background: linear-gradient(180deg, rgba(226, 194, 117, 0.14) 0%, rgba(226, 194, 117, 0.07) 100%);
      color: var(--accent-gold);
      font-size: 13px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .profile-avatar-action:hover {
      transform: translateY(-1px);
      background: linear-gradient(180deg, rgba(226, 194, 117, 0.18) 0%, rgba(226, 194, 117, 0.09) 100%);
      border-color: rgba(226, 194, 117, 0.28);
    }

    .profile-avatar-action i {
      width: 15px;
      height: 15px;
    }

    .profile-hero-meta {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }

    .profile-store-name {
      color: #fff;
      font-size: 28px;
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: -0.6px;
      text-shadow: 0 4px 14px rgba(0, 0, 0, 0.24);
    }

    .profile-hours-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .profile-hours-pill,
    .profile-status-pill {
      min-height: 36px;
      padding: 0 14px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .profile-hours-pill {
      background: rgba(0, 0, 0, 0.26);
      color: rgba(255, 255, 255, 0.86);
    }

    .profile-status-pill {
      background: linear-gradient(180deg, rgba(226, 194, 117, 0.14) 0%, rgba(226, 194, 117, 0.08) 100%);
      color: var(--accent-gold);
      border-color: rgba(226, 194, 117, 0.18);
    }

    .profile-status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #27d86b;
      box-shadow: 0 0 0 4px rgba(39, 216, 107, 0.15);
    }

    .profile-working-note {
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.5;
    }

    /* Plain image preview (no card/decoration) */
    .profile-image-preview-row {
      display: none;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
    }

    .profile-image-preview-row.active {
      display: flex;
    }

    .profile-image-preview {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .profile-image-preview-label {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.82);
      letter-spacing: 0.2px;
    }

    .profile-identity {
      width: 100%;
      min-width: 0;
      text-align: center;
    }

    .profile-identity h2 {
      font-size: 31px;
      font-weight: 800;
      margin-bottom: 0;
      color: #fff;
      letter-spacing: -0.7px;
      line-height: 1.05;
      text-shadow: 0 4px 14px rgba(0, 0, 0, 0.24);
    }

    .profile-subline {
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.5;
      max-width: 320px;
      margin: 0 auto;
    }

    .profile-accordion {
      overflow: hidden;
    }

    .profile-accordion-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 78px;
      padding: 18px;
      border: 0;
      background: transparent;
      color: #fff;
      cursor: pointer;
      text-align: left;
    }

    .profile-accordion-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, rgba(226, 194, 117, 0.13) 0%, rgba(226, 194, 117, 0.07) 100%);
      border: 1px solid rgba(226, 194, 117, 0.1);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .profile-accordion-icon i {
      width: 18px;
      height: 18px;
      color: var(--accent-gold);
    }

    .profile-accordion-title {
      flex: 1;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.1px;
    }

    .profile-accordion-chevron {
      width: 18px;
      height: 18px;
      color: rgba(255, 255, 255, 0.38);
      transition: transform 0.28s ease, color 0.28s ease;
      flex-shrink: 0;
    }

    .profile-accordion.open .profile-accordion-chevron {
      transform: rotate(90deg);
      color: var(--accent-gold);
    }

    .profile-accordion-body {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      padding: 0 18px;
      transition: max-height 0.35s ease, opacity 0.25s ease, padding 0.25s ease;
    }

    .profile-accordion.open .profile-accordion-body {
      max-height: 860px;
      opacity: 1;
      padding: 2px 18px 18px;
    }

    .profile-contact {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      padding-top: 4px;
    }

    .profile-contact-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      min-width: 0;
      padding: 14px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.036) 0%, rgba(255, 255, 255, 0.022) 100%);
      border: 1px solid rgba(255, 255, 255, 0.07);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .profile-contact-row i {
      width: 16px;
      height: 16px;
      color: var(--accent-gold);
      flex-shrink: 0;
      margin-top: 2px;
    }

    .profile-contact-copy {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .profile-contact-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.46);
    }

    .profile-contact-value {
      color: rgba(255, 255, 255, 0.88);
      font-size: 13px;
      line-height: 1.4;
      word-break: break-word;
    }

    .profile-form {
      display: grid;
      gap: 14px;
      padding-top: 4px;
    }

    .profile-field {
      display: grid;
      gap: 8px;
    }

    .profile-input-wrap {
      position: relative;
    }

    .profile-field input,
    .profile-field select {
      width: 100%;
      min-height: 52px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--glass-border);
      padding: 15px 20px;
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 16px;
      outline: none;
      transition: all 0.3s ease;
    }

    .profile-input-wrap input {
      padding-right: 56px;
    }

    .profile-field input:focus,
    .profile-field select:focus {
      border-color: var(--accent-gold);
      background: rgba(0, 0, 0, 0.5);
      box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
    }

    .profile-field input::placeholder {
      color: var(--text-secondary);
    }

    .profile-field input[readonly] {
      color: rgba(255, 255, 255, 0.6);
      background: rgba(0, 0, 0, 0.22);
      cursor: not-allowed;
    }

    .profile-location-btn {
      position: absolute;
      top: 50%;
      right: 8px;
      transform: translateY(-50%);
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, rgba(226, 194, 117, 0.16) 0%, rgba(226, 194, 117, 0.1) 100%);
      color: var(--accent-gold);
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition: background 0.2s ease, transform 0.2s ease, opacity 0.2s ease;
    }

    .profile-location-btn:hover {
      background: rgba(226, 194, 117, 0.18);
    }

    .profile-location-btn:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .profile-location-btn i,
    .profile-location-btn svg {
      width: 16px;
      height: 16px;
    }

    .profile-choice-group {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .profile-choice {
      min-height: 48px;
      padding: 0 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 15px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.035) 0%, rgba(255, 255, 255, 0.025) 100%);
      color: rgba(255, 255, 255, 0.72);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .profile-choice.is-active {
      background: linear-gradient(135deg, #e2c275 0%, #caa14b 100%);
      border-color: rgba(226, 194, 117, 0.65);
      color: #111;
      box-shadow: 0 10px 20px rgba(226, 194, 117, 0.16);
    }

    .profile-form-note {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.52);
      line-height: 1.5;
      padding: 0 2px 2px;
    }

    .profile-form-actions {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      gap: 8px;
      padding-top: 4px;
    }

    .profile-save-btn {
      width: 100%;
      min-height: 52px;
      padding: 16px;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent-gold), #b58c16);
      color: #000;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .profile-save-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
    }

    .profile-save-status {
      min-height: 16px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.62);
      text-align: center;
    }

    .profile-logout {
      margin-top: 18px;
      gap: 10px;
      font-weight: 700;
    }

    .profile-logout i,
    .profile-logout svg {
      width: 18px;
      height: 18px;
    }

    @media (max-width: 390px) {
      .profile-page {
        padding-top: 66px;
        padding-left: 14px;
        padding-right: 14px;
      }

      .profile-top-brand img {
        width: 40px;
        height: 40px;
      }

      .profile-avatar {
        height: 176px;
      }

      .profile-store-name {
        font-size: 25px;
      }

      .profile-identity h2 {
        font-size: 28px;
      }

      .profile-accordion-title {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="app-container">

    <div class="profile-page">
      <div class="profile-top-brand">
        <img src="image/High%20Qulity/Final-logo.png" alt="Ustra logo">
      </div>

      <div class="profile-hero">
        <div class="profile-avatar-wrap">
          <img class="profile-avatar" data-profile-avatar alt="Store photo"
            src="image/salon-bg.png">
          <input type="file" id="profileAvatarInput" accept="image/*" hidden onchange="handleProfileImageChange(event)">
        </div>
        <div class="profile-hero-meta">
          <h2 class="profile-store-name" data-profile-name>Urban Trim Salon</h2>
          <div class="profile-hours-row" aria-label="Working hours">
            <span class="profile-hours-pill">
              <i data-lucide="clock-3" style="width:14px; height:14px;"></i>
              <span>09:00 AM - 06:00 PM</span>
            </span>
            <span class="profile-status-pill">
              <span class="profile-status-dot" aria-hidden="true"></span>
              <span>Working</span>
            </span>
          </div>
        </div>
      </div>

      <div class="profile-card profile-accordion open" id="profile-personal">
        <button class="profile-accordion-toggle" type="button" onclick="toggleProfileSection('profile-personal')" aria-expanded="true">
          <span class="profile-accordion-icon">
            <i data-lucide="store"></i>
          </span>
          <span class="profile-accordion-title">Business Details</span>
          <i data-lucide="chevron-right" class="profile-accordion-chevron"></i>
        </button>
        <div class="profile-accordion-body">
          <form class="profile-form" id="profileDetailsForm" onsubmit="saveProfileDetails(event)">
            <label class="profile-field">
              <span class="profile-contact-label">Store Photo</span>
              <button class="profile-avatar-action" type="button" onclick="openProfileImagePicker()">
                <i data-lucide="image-plus"></i>
                <span>Add / Change Store Photo</span>
              </button>
              <div class="profile-image-preview-row" id="profileImagePreviewRow" aria-live="polite">
                <img class="profile-image-preview" id="profileImagePreviewImg" alt="Selected profile preview">
                <span class="profile-image-preview-label">Selected Photo</span>
              </div>
            </label>

            <label class="profile-field">
              <span class="profile-contact-label">Business Name</span>
              <input type="text" id="profileNameInput" name="profileName" value="Urban Trim Salon" required>
            </label>

            <label class="profile-field">
              <span class="profile-contact-label">Email</span>
              <input type="email" id="profileEmailInput" name="profileEmail" value="urbantrim@example.com" readonly>
            </label>

            <label class="profile-field">
              <span class="profile-contact-label">Phone</span>
              <input type="tel" id="profilePhoneInput" name="profilePhone" value="+91 98765 43210" required>
            </label>

            <label class="profile-field">
              <span class="profile-contact-label">Business Location</span>
              <div class="profile-input-wrap">
                <input type="text" id="profileLocationInput" name="profileLocation" value="Hazratganj, Lucknow" required>
                <button type="button" class="profile-location-btn" id="profileLocationBtn" onclick="detectLiveLocation()" aria-label="Detect live location">
                  <i data-lucide="locate-fixed"></i>
                </button>
              </div>
            </label>

            <label class="profile-field">
              <span class="profile-contact-label">Category</span>
              <input type="hidden" id="profileGenderInput" name="profileGender" value="Barber Shop">
              <div class="profile-choice-group" id="profileGenderChoices">
                <button type="button" class="profile-choice is-active" data-gender-choice data-value="Barber Shop" aria-pressed="true" onclick="selectProfileGender('Barber Shop')">Barber Shop</button>
                <button type="button" class="profile-choice" data-gender-choice data-value="Salon" aria-pressed="false" onclick="selectProfileGender('Salon')">Salon</button>
                <button type="button" class="profile-choice" data-gender-choice data-value="Men Grooming" aria-pressed="false" onclick="selectProfileGender('Men Grooming')">Men Grooming</button>
              </div>
            </label>

            <div class="profile-form-actions">
              <button type="submit" class="profile-save-btn" id="profileSaveBtn">Save Details</button>
              <span class="profile-save-status" id="profileSaveStatus"></span>
            </div>
          </form>
        </div>
      </div>

      <div class="profile-card profile-accordion open" id="profile-contact-section">
        <button class="profile-accordion-toggle" type="button" onclick="toggleProfileSection('profile-contact-section')" aria-expanded="true">
          <span class="profile-accordion-icon">
            <i data-lucide="headphones"></i>
          </span>
          <span class="profile-accordion-title">Contact & Support</span>
          <i data-lucide="chevron-right" class="profile-accordion-chevron"></i>
        </button>
        <div class="profile-accordion-body">
          <div class="profile-contact">
            <div class="profile-contact-row">
              <i data-lucide="phone"></i>
              <div class="profile-contact-copy">
                <span class="profile-contact-label">Partner Support Number</span>
                <span class="profile-contact-value">65942158945 (9AM - 6PM)</span>
              </div>
            </div>
            <div class="profile-contact-row">
              <i data-lucide="message-circle"></i>
              <div class="profile-contact-copy">
                <span class="profile-contact-label">Partner Support Email</span>
                <span class="profile-contact-value">help@ustra.app</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <a href="index.html" class="btn-secondary profile-logout">
        <i data-lucide="log-out"></i>
        <span>Log Out</span>
      </a>
    </div>

    <nav class="bottom-nav">
      <a href="partner-dashboard.html" class="nav-item">
        <i data-lucide="home"></i>
        <span>Dashboard</span>
      </a>
      <a href="partner-bookings.html" class="nav-item">
        <i data-lucide="calendar"></i>
        <span>Bookings</span>
      </a>
      <a href="partner-services.html" class="nav-item">
        <i data-lucide="scissors"></i>
        <span>Services</span>
      </a>
      <a href="partner-staff.html" class="nav-item">
        <i data-lucide="users-round"></i>
        <span>Staff</span>
      </a>
      <a href="partner-profile.html" class="nav-item active">
        <i data-lucide="store"></i>
        <span>Profile</span>
      </a>
    </nav>

  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();

    const PROFILE_STORAGE_KEY = 'ustra_partner_profile_data';
    const defaultProfileData = {
      name: 'Urban Trim Salon',
      email: 'urbantrim@example.com',
      phone: '+91 98765 43210',
      location: 'Hazratganj, Lucknow',
      gender: 'Barber Shop',
      avatar: 'image/salon-bg.png'
    };
    let pendingProfileAvatar = null;

    // Location Dropdown Logic (Synchronized with Home)
    const locations = [
      { name: 'Hazratganj, Lucknow', area: 'Central Lucknow' },
      { name: 'Gomti Nagar, Lucknow', area: 'East Lucknow' },
      { name: 'Aliganj, Lucknow', area: 'North Lucknow' },
      { name: 'Indira Nagar, Lucknow', area: 'North East Lucknow' },
      { name: 'Jankipuram, Lucknow', area: 'Outer North Lucknow' }
    ];

    function getProfileData() {
      try {
        const savedProfile = localStorage.getItem(PROFILE_STORAGE_KEY);
        const profile = savedProfile ? { ...defaultProfileData, ...JSON.parse(savedProfile) } : { ...defaultProfileData };
        if (!profile.avatar || profile.avatar.includes('Final-logo.png')) {
          profile.avatar = defaultProfileData.avatar;
        }
        return profile;
      } catch (error) {
        return { ...defaultProfileData };
      }
    }

    function renderProfileAvatar(avatarSrc) {
      const url = String(avatarSrc || '').trim();
      if (!url) return;

      document.querySelectorAll('[data-profile-avatar]').forEach(node => {
        if (node.tagName === 'IMG') {
          node.src = url;
          return;
        }
        node.style.backgroundImage = `url("${url}")`;
      });

    }

    function renderPendingProfilePreview(imageSrc) {
      const previewRow = document.getElementById('profileImagePreviewRow');
      const previewImage = document.getElementById('profileImagePreviewImg');
      if (!previewRow || !previewImage) return;

      const src = String(imageSrc || '').trim();
      if (!src) {
        previewRow.classList.remove('active');
        previewImage.removeAttribute('src');
        return;
      }

      previewImage.src = src;
      previewRow.classList.add('active');
    }

    function selectProfileGender(value) {
      const genderInput = document.getElementById('profileGenderInput');
      if (genderInput) {
        genderInput.value = value;
      }

      document.querySelectorAll('[data-gender-choice]').forEach(button => {
        const isActive = button.dataset.value === value;
        button.classList.toggle('is-active', isActive);
        button.setAttribute('aria-pressed', isActive ? 'true' : 'false');
      });
    }

    function renderProfileData(profile) {
      document.querySelectorAll('[data-profile-name]').forEach(node => {
        node.textContent = profile.name;
      });

      renderProfileAvatar(profile.avatar || defaultProfileData.avatar);
      renderPendingProfilePreview(null);

      const form = document.getElementById('profileDetailsForm');
      if (!form) return;

      form.profileName.value = profile.name;
      form.profileEmail.value = profile.email;
      form.profilePhone.value = profile.phone;
      form.profileLocation.value = profile.location;
      selectProfileGender(profile.gender || defaultProfileData.gender);
    }

    function openProfileImagePicker() {
      document.getElementById('profileAvatarInput')?.click();
    }

    function handleProfileImageChange(event) {
      const [file] = event.target.files || [];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = ({ target }) => {
        const dataUrl = target?.result || null;
        if (!dataUrl) return;

        // Show preview under the button; apply to profile only after Save Details.
        pendingProfileAvatar = dataUrl;
        renderPendingProfilePreview(dataUrl);

        if (event?.target) {
          event.target.value = '';
        }
        setProfileStatus('');
      };
      reader.readAsDataURL(file);
    }

    function setProfileStatus(message) {
      const saveStatus = document.getElementById('profileSaveStatus');
      if (saveStatus) {
        saveStatus.textContent = message;
      }
    }

    function setLocationDetectState(isLoading) {
      const locationButton = document.getElementById('profileLocationBtn');
      if (!locationButton) return;

      locationButton.disabled = isLoading;
      locationButton.style.transform = isLoading ? 'translateY(-50%) scale(0.96)' : 'translateY(-50%)';
    }

    function dedupeParts(parts) {
      const out = [];
      parts.forEach((part) => {
        const value = String(part || '').trim();
        if (!value) return;
        if (out.includes(value)) return;
        out.push(value);
      });
      return out;
    }

    function formatNominatimAddress(address) {
      const a = address || {};

      const area =
        a.suburb ||
        a.neighbourhood ||
        a.quarter ||
        a.city_district ||
        a.hamlet ||
        a.village ||
        a.town ||
        a.city ||
        '';

      // Nominatim (India) often provides taluka under "county".
      const taluka = a.county || '';

      const city =
        a.city ||
        a.town ||
        a.village ||
        a.state_district ||
        a.district ||
        '';

      const state = a.state || a.region || '';

      return dedupeParts([area, taluka, city, state]).join(', ');
    }

    function nominatimReverseGeocodeJsonp(lat, lng) {
      return new Promise((resolve, reject) => {
        const callbackName = '__nominatim_cb_' + Math.random().toString(36).slice(2);
        const script = document.createElement('script');
        const timeout = setTimeout(() => cleanup(new Error('timeout')), 12000);

        function cleanup(error) {
          clearTimeout(timeout);
          delete window[callbackName];
          script.remove();
          if (error) reject(error);
        }

        window[callbackName] = (payload) => {
          try {
            const formatted = formatNominatimAddress(payload && payload.address);
            resolve(formatted);
          } catch (err) {
            reject(err);
          } finally {
            cleanup();
          }
        };

        script.onerror = () => cleanup(new Error('load-error'));
        script.src =
          'https://nominatim.openstreetmap.org/reverse' +
          '?format=json' +
          '&lat=' + encodeURIComponent(lat) +
          '&lon=' + encodeURIComponent(lng) +
          '&zoom=18' +
          '&addressdetails=1' +
          '&json_callback=' + encodeURIComponent(callbackName);

        document.head.appendChild(script);
      });
    }

    async function reverseGeocodeLocation(latitude, longitude) {
      // Prefer Nominatim JSONP (avoids CORS). Fallback to BigDataCloud if blocked.
      try {
        return await nominatimReverseGeocodeJsonp(latitude, longitude);
      } catch (_) {
        // ignore
      }

      const url =
        'https://api.bigdatacloud.net/data/reverse-geocode-client' +
        '?latitude=' + encodeURIComponent(latitude) +
        '&longitude=' + encodeURIComponent(longitude) +
        '&localityLanguage=en';

      const response = await fetch(url, { headers: { Accept: 'application/json' } });
      if (!response.ok) {
        throw new Error('reverse-geocode-failed');
      }

      const data = await response.json();
      const locality = (data.locality || data.city || '').trim();
      const city = (data.city || '').trim();
      const state = (data.principalSubdivision || '').trim();
      return dedupeParts([locality, city, state]).join(', ');
    }

    async function detectLiveLocation() {
      const locationInput = document.getElementById('profileLocationInput');
      if (!locationInput) return;

      if (!navigator.geolocation) {
        setProfileStatus('Location not supported');
        return;
      }

      setLocationDetectState(true);
      setProfileStatus('Detecting location...');

      try {
        const position = await new Promise((resolve, reject) => {
          navigator.geolocation.getCurrentPosition(resolve, reject, {
            enableHighAccuracy: true,
            timeout: 12000,
            maximumAge: 0
          });
        });

        const latitude = position.coords.latitude;
        const longitude = position.coords.longitude;

        try {
          const liveLocation = await reverseGeocodeLocation(latitude, longitude);
          const nextValue = String(liveLocation || '').trim();
          if (nextValue) {
            locationInput.value = nextValue;
            const headerLocation = document.getElementById('current-location');
            if (headerLocation) {
              headerLocation.textContent = nextValue;
            }
            setProfileStatus('Location detected');
          } else {
            setProfileStatus('Unable to detect location');
          }
        } catch (error) {
          setProfileStatus('Unable to detect location');
        }
      } catch (error) {
        setProfileStatus(error?.code === 1 ? 'Location permission denied' : 'Unable to detect location');
      } finally {
        setLocationDetectState(false);

        clearTimeout(window.profileLocationStatusTimer);
        window.profileLocationStatusTimer = setTimeout(() => {
          const saveButton = document.getElementById('profileSaveBtn');
          if (saveButton?.textContent !== 'Saved') {
            setProfileStatus('');
          }
        }, 1800);
      }
    }

    function saveProfileDetails(event) {
      event.preventDefault();

      const form = event.currentTarget;
      const existingProfile = getProfileData();
      const updatedProfile = {
        name: form.profileName.value.trim() || defaultProfileData.name,
        email: defaultProfileData.email,
        phone: form.profilePhone.value.trim() || defaultProfileData.phone,
        location: form.profileLocation.value.trim() || defaultProfileData.location,
        gender: form.profileGender.value || defaultProfileData.gender,
        avatar: pendingProfileAvatar || existingProfile.avatar || defaultProfileData.avatar
      };

      localStorage.setItem(PROFILE_STORAGE_KEY, JSON.stringify(updatedProfile));
      renderProfileData(updatedProfile);
      pendingProfileAvatar = null;

      const avatarInput = document.getElementById('profileAvatarInput');
      if (avatarInput) {
        avatarInput.value = '';
      }

      const saveButton = document.getElementById('profileSaveBtn');

      setProfileStatus('Saved successfully');

      if (saveButton) {
        saveButton.textContent = 'Saved';
      }

      clearTimeout(window.profileSaveTimer);
      window.profileSaveTimer = setTimeout(() => {
        setProfileStatus('');
        if (saveButton) saveButton.textContent = 'Save Details';
      }, 1800);

      // Auto-close the Personal Details accordion after saving.
      setTimeout(() => {
        const section = document.getElementById('profile-personal');
        if (section && section.classList.contains('open')) {
          toggleProfileSection('profile-personal');
        }
      }, 350);
    }

    renderProfileData(getProfileData());

    function toggleProfileSection(id) {
      const targetSection = document.getElementById(id);
      if (!targetSection) return;

      const shouldOpen = !targetSection.classList.contains('open');

      document.querySelectorAll('.profile-accordion').forEach(section => {
        section.classList.remove('open');
        section.querySelector('.profile-accordion-toggle')?.setAttribute('aria-expanded', 'false');
      });

      if (shouldOpen) {
        targetSection.classList.add('open');
        targetSection.querySelector('.profile-accordion-toggle')?.setAttribute('aria-expanded', 'true');
      }
    }

  </script>
</body>
