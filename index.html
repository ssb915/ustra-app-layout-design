<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ustra</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

      /* 🧊 Metallic Grey Background */
      background: linear-gradient(
        to bottom,
        #f2f2f2 0%,
        #dcdcdc 40%,
        #cfcfcf 60%,
        #e6e6e6 100%
      );

      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      transform: translateY(-25px);
    }

    .logo {
      width: 190px;
      height: 190px;
      border-radius: 35px;

      /* 💎 Metallic Shadow */
      box-shadow:
        0 20px 50px rgba(0,0,0,0.2),
        inset 0 2px 4px rgba(255,255,255,0.6);

      margin-bottom: 30px;
    }

    .tagline {
      font-size: 15px;
      color: #1a1a1a; /* ⚫ dark text */
      letter-spacing: 0.5px;
      margin-bottom: 15px;
    }

    .line {
      width: 45px;
      height: 2px;
      margin: 12px auto 25px;

      /* 🧊 metallic line */
      background: linear-gradient(to right, #999, #333, #999);
      border-radius: 10px;
    }

    .india-logo {
	  width: 180px;   
	  opacity: 0.85;
	  filter: grayscale(100%);
	}
  </style>
</head>

<body>

  <div class="container">

    <!-- Logo -->
    <img src="image/bg-eress-logo.png" class="logo">

    <!-- Tagline -->
    <div class="tagline">
      Nayi ki dukan ab apke jeb me
    </div>

    <!-- Divider -->
    <div class="line"></div>

    <!-- Make in India -->
    <img src="image/Make-in-India.png"
         class="india-logo">

  </div>

</body>
</html>
