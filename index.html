<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barber Hub - Find Best Salons</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --primary: #1e40af;
      --surface: #fafafa;
    }
    body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--surface); -webkit-tap-highlight-color: transparent; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="pb-24">

  <div class="max-w-md mx-auto min-h-screen bg-white shadow-sm">
    
    <header class="bg-white px-4 pt-5 pb-3 sticky top-0 z-50">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-lg bg-blue-800 flex items-center justify-center">
            <i data-lucide="scissors" class="w-4 h-4 text-white"></i>
          </div>
          <h1 class="text-xl font-bold text-zinc-900 tracking-tight">Barber Hub</h1>
        </div>
        
        <button onclick="toggleDrawer()" class="w-9 h-9 rounded-full bg-zinc-50 flex items-center justify-center border border-zinc-200 hover:bg-zinc-100 transition-colors">
          <i data-lucide="menu" class="w-5 h-5 text-zinc-700"></i>
        </button>
      </div>

      <div class="flex items-center gap-1.5 text-zinc-600 cursor-pointer w-fit hover:text-blue-800 transition-colors">
        <i data-lucide="map-pin" class="w-4 h-4 text-blue-800"></i>
        <span class="text-sm font-medium">Visnagar, Gujarat</span>
        <i data-lucide="chevron-down" class="w-4 h-4"></i>
      </div>
    </header>

    <main class="px-4 py-2 space-y-6">

      <div class="relative">
        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-zinc-400"></i>
        <input type="text" placeholder="Search for salons, services..." 
               class="w-full bg-zinc-100 border-none rounded-2xl py-3.5 pl-11 pr-4 text-sm focus:ring-2 focus:ring-blue-800 outline-none placeholder:text-zinc-500">
        <button class="absolute right-2 top-1/2 -translate-y-1/2 p-2 bg-white rounded-xl shadow-sm">
          <i data-lucide="sliders-horizontal" class="w-4 h-4 text-zinc-700"></i>
        </button>
      </div>

      <div class="relative w-full h-40 rounded-3xl overflow-hidden shadow-md">
        <img src="https://images.unsplash.com/photo-1585747860715-2ba37e788b70?auto=format&fit=crop&q=80&w=800" 
             alt="Barber Tools" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-r from-zinc-900/80 to-transparent"></div>
        <div class="absolute inset-y-0 left-0 p-5 flex flex-col justify-center">
          <span class="px-2.5 py-1 bg-blue-600 text-white text-[10px] font-bold uppercase tracking-wider rounded-md w-fit mb-2">Offer</span>
          <h2 class="text-white font-bold text-lg leading-tight w-2/3">Get 20% off on your first booking!</h2>
        </div>
      </div>

      <section>
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-lg font-bold text-zinc-900">Categories</h3>
          <span class="text-sm text-blue-800 font-medium cursor-pointer">See all</span>
        </div>
        <div class="flex gap-4 overflow-x-auto hide-scrollbar -mx-4 px-4 pb-2">
          <div class="flex flex-col items-center gap-2 flex-shrink-0 cursor-pointer group">
            <div class="w-16 h-16 rounded-full bg-blue-50 flex items-center justify-center border border-blue-100">
              <i data-lucide="scissors" class="w-7 h-7 text-blue-800"></i>
            </div>
            <span class="text-xs font-medium text-zinc-700">Haircut</span>
          </div>
          <div class="flex flex-col items-center gap-2 flex-shrink-0 cursor-pointer group">
            <div class="w-16 h-16 rounded-full bg-orange-50 flex items-center justify-center border border-orange-100">
              <i data-lucide="razor" class="w-7 h-7 text-orange-600"></i>
            </div>
            <span class="text-xs font-medium text-zinc-700">Shaving</span>
          </div>
          <div class="flex flex-col items-center gap-2 flex-shrink-0 cursor-pointer group">
            <div class="w-16 h-16 rounded-full bg-emerald-50 flex items-center justify-center border border-emerald-100">
              <i data-lucide="droplet" class="w-7 h-7 text-emerald-600"></i>
            </div>
            <span class="text-xs font-medium text-zinc-700">Facial</span>
          </div>
          <div class="flex flex-col items-center gap-2 flex-shrink-0 cursor-pointer group">
            <div class="w-16 h-16 rounded-full bg-purple-50 flex items-center justify-center border border-purple-100">
              <i data-lucide="sparkles" class="w-7 h-7 text-purple-600"></i>
            </div>
            <span class="text-xs font-medium text-zinc-700">Massage</span>
          </div>
        </div>
      </section>

      <section>
        <h3 class="text-lg font-bold text-zinc-900 mb-3">Nearby Salons</h3>
        <div class="space-y-4">
          
          <a href="shop.html" class="block bg-white border border-zinc-100 rounded-2xl p-3 shadow-sm hover:shadow-md transition-shadow">
            <div class="flex gap-4">
              <div class="w-24 h-24 rounded-xl overflow-hidden flex-shrink-0 relative">
                <img src="https://images.unsplash.com/photo-1503951914875-452162b0f3f1?auto=format&fit=crop&q=80&w=400" alt="Premium Barbers" class="w-full h-full object-cover">
                <div class="absolute top-1 left-1 bg-white/90 backdrop-blur-sm px-1.5 py-0.5 rounded text-[10px] font-bold text-blue-800 flex items-center gap-0.5">
                  <i data-lucide="star" class="w-3 h-3 fill-blue-800"></i> 4.8
                </div>
              </div>
              <div class="flex-1 py-1">
                <div class="flex justify-between items-start">
                  <h4 class="font-bold text-zinc-900 text-base leading-tight">Premium Barbers</h4>
                </div>
                <p class="text-xs text-zinc-500 mt-1 flex items-center gap-1">
                  <i data-lucide="map-pin" class="w-3 h-3"></i> 1.2 km • Opp. Om Arcade
                </p>
                <div class="flex items-center gap-2 mt-2">
                  <span class="px-2 py-1 bg-blue-50 text-blue-800 text-[10px] font-medium rounded-md">Haircut</span>
                  <span class="px-2 py-1 bg-zinc-100 text-zinc-600 text-[10px] font-medium rounded-md">Shaving</span>
                </div>
              </div>
            </div>
          </a>

        </div>
      </section>

    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-zinc-100 px-8 py-3 z-50">
      <div class="max-w-md mx-auto flex justify-between items-center">
        <a href="index.html" class="flex flex-col items-center gap-1 cursor-pointer w-16">
          <i data-lucide="home" class="w-6 h-6 text-blue-800"></i>
          <span class="text-[10px] font-semibold text-blue-800">Home</span>
        </a>
        <a href="bookings.html" class="flex flex-col items-center gap-1 cursor-pointer opacity-50 hover:opacity-100 transition-opacity w-16">
          <i data-lucide="calendar" class="w-6 h-6 text-zinc-600"></i>
          <span class="text-[10px] font-medium text-zinc-600">Bookings</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center gap-1 cursor-pointer opacity-50 hover:opacity-100 transition-opacity w-16">
          <i data-lucide="user" class="w-6 h-6 text-zinc-600"></i>
          <span class="text-[10px] font-medium text-zinc-600">Profile</span>
        </a>
      </div>
    </div>

  </div>
  
  <div id="drawer-overlay" onclick="toggleDrawer()" class="fixed inset-0 bg-zinc-900/60 z-[60] opacity-0 pointer-events-none transition-opacity duration-300"></div>

  <div id="side-drawer" class="fixed top-0 right-0 h-full w-[80%] max-w-sm bg-white z-[70] transform translate-x-full transition-transform duration-300 shadow-2xl flex flex-col">
    
    <div class="px-6 py-5 border-b border-zinc-100 flex items-center justify-between bg-zinc-50">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-zinc-200 flex items-center justify-center">
          <i data-lucide="user" class="w-5 h-5 text-zinc-600"></i>
        </div>
        <div>
          <h3 class="font-bold text-zinc-900">Arjun</h3>
          <p class="text-xs text-zinc-500">+91 98765 43210</p>
        </div>
      </div>
      <button onclick="toggleDrawer()" class="p-2 bg-white rounded-full shadow-sm border border-zinc-200 hover:bg-zinc-100">
        <i data-lucide="x" class="w-4 h-4 text-zinc-600"></i>
      </button>
    </div>

    <div class="flex-1 overflow-y-auto py-4 px-4 space-y-2">
      <button onclick="drawerAlert('Account Settings')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-zinc-50 transition-colors text-left">
        <i data-lucide="settings" class="w-5 h-5 text-zinc-500"></i>
        <span class="text-sm font-medium text-zinc-700">Account Settings</span>
      </button>
      <button onclick="drawerAlert('Help & Support')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-zinc-50 transition-colors text-left">
        <i data-lucide="help-circle" class="w-5 h-5 text-zinc-500"></i>
        <span class="text-sm font-medium text-zinc-700">Help & Support</span>
      </button>
      <button onclick="drawerAlert('Terms & Conditions')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-zinc-50 transition-colors text-left">
        <i data-lucide="file-text" class="w-5 h-5 text-zinc-500"></i>
        <span class="text-sm font-medium text-zinc-700">Terms & Conditions</span>
      </button>
      <button onclick="drawerAlert('Privacy Policy')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-zinc-50 transition-colors text-left">
        <i data-lucide="shield" class="w-5 h-5 text-zinc-500"></i>
        <span class="text-sm font-medium text-zinc-700">Privacy Policy</span>
      </button>
    </div>

    <div class="p-4 border-t border-zinc-100">
      <button onclick="toggleDrawer()" class="w-full flex items-center justify-center gap-2 p-3 bg-red-50 text-red-600 rounded-xl hover:bg-red-100 transition-colors font-medium text-sm">
        <i data-lucide="log-out" class="w-4 h-4"></i>
        Log Out
      </button>
    </div>
  </div>
  
  <script>
    // Drawer Logic
    function toggleDrawer() {
      const drawer = document.getElementById('side-drawer');
      const overlay = document.getElementById('drawer-overlay');
      
      // Toggle Drawer Sliding
      drawer.classList.toggle('translate-x-full');
      
      // Toggle Overlay Fade
      if (overlay.classList.contains('opacity-0')) {
        overlay.classList.remove('opacity-0', 'pointer-events-none');
        overlay.classList.add('opacity-100');
      } else {
        overlay.classList.remove('opacity-100');
        overlay.classList.add('opacity-0', 'pointer-events-none');
      }
    }

    // Dummy Alert for links
    function drawerAlert(pageName) {
      alert(`${pageName} page will be available in the final app.`);
      toggleDrawer(); // Close drawer after clicking
    }

    lucide.createIcons();
  </script>
</body>
</html>
