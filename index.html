<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ustra</title>
  <link rel="stylesheet" href="customer-style.css">
  <style>
    body {
      background: var(--bg-darker);
      color: var(--text-primary);
      margin: 0;
      min-height: 100dvh;
      padding: 20px 16px 32px;
      display: flex;
      justify-content: center;
    }

    .wrap {
      width: min(520px, 100%);
      padding: 26px 16px 32px;
      display: grid;
      align-content: start;
      gap: 18px;
    }

    .logo {
      width: 110px;
      height: 110px;
      border-radius: 22px;
      background: #fff;
      display: grid;
      place-items: center;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.25);
      margin: 5px auto 14px;
    }

    .logo img {
      width: 75%;
      height: 100%;
      object-fit: contain;
      filter: none;
    }

    h1 {
      font-size: 22px;
      text-align: center;
      margin-top: 4px;
    }

    .subtitle {
      text-align: center;
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.6;
      margin-top: -6px;
      font-weight: 600;
      letter-spacing: 0.4px;
    }

    .subtitle strong {
      display: block;
      font-size: 18px;
      letter-spacing: 0.8px;
      color: var(--accent-gold);
      margin-bottom: 4px;
    }

    .subtitle .tagline-note {
      font-size: 12px;
      letter-spacing: 0.3px;
      color: rgba(255,255,255,0.7);
      margin-top: 4px;
      font-weight: 400;
    }

    .label {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 10px;
    }

    .role-group {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .role {
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 14px 10px;
      display: grid;
      place-items: center;
      gap: 10px;
      cursor: pointer;
      background: var(--glass-bg);
    }

    .role svg {
      width: 24px;
      height: 24px;
      color: var(--accent-gold);
    }

    .role-text {
      text-align: center;
    }

    .role-text strong {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.2px;
    }

    .role-text small {
      display: block;
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 3px;
    }

    .role.active {
      border-color: var(--accent-gold);
    }

    .role.active svg {
      color: var(--accent-gold);
    }

    .cta {
      margin-top: 8px;
      background: linear-gradient(135deg, var(--accent-gold), #b58c16);
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .partner-logos {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-top: 10px;
    }

    .partner-logos img {
      height: 100px;
      object-fit: contain;
      transition: transform 0.2s ease;
    }

    @media (max-width: 520px) {
      body {
        padding: 0 10px;
      }

      .wrap {
        padding: 28px 16px 32px;
        box-shadow: 0 0 20px rgba(0,0,0,0.35);
      }

      .role {
        padding: 14px;
      }

      .cta {
        font-size: 15px;
      }

      .partner-logos img {
        height: 90px;
      }
    }

    @media (max-width: 360px) {
      body {
        padding: 0 8px;
      }

      h1 {
        font-size: 20px;
      }

      .subtitle {
        font-size: 14px;
      }

      .role {
        padding: 12px;
      }

      .partner-logos img {
        height: 80px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <img src="image/bg-eress-logo.png" alt="Ustra Logo">
    </div>

    <h1 style="text-align:center;">Welcome to Ustra</h1>
    <p class="subtitle" style="color:#e2c275; text-align:left; text-transform:uppercase;">
      Nayi Ki Dukan Ab Apke Jeb Me India’s first salon experience in your pocket
    </p>

    <div class="label">How will you use the app?</div>
    <div class="role-group" id="roleGroup">
      <div class="role active" data-role="customer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4z"/>
          <path d="M4 20c0-2.67 5.33-4 8-4s8 1.33 8 4"/>
        </svg>
        <div class="role-text">
          <strong>Customer Login</strong>
          <small>Book your haircut easily</small>
        </div>
      </div>
      <div class="role" data-role="partner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M3 9h18"/>
          <path d="M6 9V5h12v4"/>
          <path d="M4 9v10h16V9"/>
        </svg>
        <div class="role-text">
          <strong>Salon Partner</strong>
          <small>Run your salon smartly</small>
        </div>
      </div>
    </div>

    <button class="cta" id="continueBtn">Continue -></button>
    <div class="partner-logos">
      <img src="image/Make-in-India.png" alt="Make in India">
      <img src="image/Digital-india.png" alt="Digital India">
    </div>
  </div>

  <script>
    const roles = document.querySelectorAll('.role');
    const continueBtn = document.getElementById('continueBtn');
    let selectedRole = 'customer';

    roles.forEach((role) => {
      role.addEventListener('click', () => {
        roles.forEach((r) => r.classList.remove('active'));
        role.classList.add('active');
        selectedRole = role.dataset.role;
      });
    });

    continueBtn.addEventListener('click', () => {
      if (selectedRole === 'partner') {
        window.location.href = 'partner-login.html';
      } else {
        window.location.href = 'customer-login.html';
      }
    });
  </script>
</body>
</html>
