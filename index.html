<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ustra</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

      background: linear-gradient(
        to bottom,
        #f2f2f2 0%,
        #dcdcdc 40%,
        #cfcfcf 60%,
        #e6e6e6 100%
      );

      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      transform: translateY(-25px);
    }

    .logo {
      width: 190px;
      height: 190px;
      border-radius: 35px;
      box-shadow:
        0 20px 50px rgba(0,0,0,0.2),
        inset 0 2px 4px rgba(255,255,255,0.6);
      margin-bottom: 30px;
    }

    .tagline {
      font-size: 15px;
      color: #1a1a1a;
      letter-spacing: 0.5px;
      margin-bottom: 15px;
    }

    .line {
      width: 45px;
      height: 2px;
      margin: 12px auto 25px;
      background: linear-gradient(to right, #999, #333, #999);
      border-radius: 10px;
    }

    .india-logo {
      width: 180px;
      opacity: 0.85;
      filter: grayscale(100%);
      margin-bottom: 25px;
    }

    /* 🔥 ROUND LOADER */
    .spinner {
      width: 35px;
      height: 35px;
      border: 4px solid #ccc;
      border-top: 4px solid #222;
      border-radius: 50%;
      margin: 0 auto;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- Logo -->
    <img src="image/bg-eress-logo.png" class="logo">

    <!-- Tagline -->
    <div class="tagline">
      Nayi ki dukan ab apke jeb me
    </div>

    <!-- Line -->
    <div class="line"></div>

    <!-- Make in India -->
    <img src="image/Make-in-India.png" class="india-logo">

    <!-- 🔥 Spinner Loader -->
    <div class="spinner"></div>

  </div>

</body>
</html>
