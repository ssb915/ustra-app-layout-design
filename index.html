<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ustra - Intro</title>

  <style>
    /* Sab kuch lock karne ke liye */
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;
      overflow: hidden; /* Scroll disable karne ke liye */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      
      /* Premium Background */
      background: linear-gradient(135deg, #fdfdfd 0%, #e0e0e0 100%);
      
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Main Content: Logo aur Spinner */
    .intro-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    .logo {
      width: 170px;
      height: 170px;
      border-radius: 38px;
      background: #fff;
      box-shadow: 0 15px 35px rgba(0,0,0,0.12);
      margin-bottom: 25px;
    }

    .tagline {
      font-size: 16px;
      font-weight: 500;
      color: #333;
      margin-bottom: 12px;
    }

    .accent-line {
      width: 40px;
      height: 3px;
      background: #222;
      border-radius: 10px;
      margin-bottom: 40px;
    }

    .loader {
      width: 34px;
      height: 34px;
      border: 3px solid rgba(0,0,0,0.08);
      border-top: 3px solid #222;
      border-radius: 50%;
      animation: spin 0.9s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* Footer: Make in India (Fixed Position) */
    .footer {
      padding-bottom: 40px;
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .india-logo {
      width: 140px; /* Bada size jaisa aapne kaha */
      opacity: 0.8;
      filter: grayscale(100%);
    }

  </style>
</head>

<body>

  <div class="intro-container">
    <img src="image/bg-eress-logo.png" class="logo">
    <div class="tagline">Nayi ki dukan ab apke jeb me</div>
    <div class="accent-line"></div>
    <div class="loader"></div>
  </div>

  <div class="footer">
    <img src="image/Make-in-India.png" class="india-logo">
  </div>

</body>
</html>
