<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustra</title>

<style>
body {
  margin: 0;
  height: 100dvh;
  font-family: Arial, sans-serif;
  background: url("image/salon-bg.png") no-repeat center center;
  background-size: cover;
  position: relative;
}

/* 🔥 RESPONSIVE CONTAINER */
.container {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  bottom: 20vh; /* 👆 responsive positioning */
  width: 90%;
  max-width: 400px;
  padding: 20px;
  border-radius: 25px;
  text-align: center;
  background: transparent;
  border: none;
  box-shadow: none;
}

.logo-block {
  display: grid;
  justify-items: center;
  gap: 8px;
  margin-bottom: 14px;
}

.logo-block img {
  width: 72px;
  height: 72px;
  border-radius: 18px;
  background: #fff;
  padding: 10px;
  box-shadow: 0 10px 22px rgba(0,0,0,0.3);
}

/* Options Row */
.options {
  display: flex;
  justify-content: space-between;
  gap: 15px;
}

/* Option Box */
.login-option {
  flex: 1;
  padding: 15px 10px;
  border-radius: 18px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(226,194,117,0.35);
  cursor: pointer;
  transition: 0.3s;
}

.login-option:hover {
  transform: scale(1.05);
  background: rgba(226,194,117,0.12);
}

/* ICON */
.login-option img {
  width: 50px;
  height: 50px;
  object-fit: contain;
  filter: brightness(0) saturate(100%) invert(80%) sepia(35%) saturate(420%) hue-rotate(12deg) brightness(90%) contrast(92%);
}

/* TEXT */
.login-option p {
  margin-top: 8px;
  color: #fff;
  font-size: 14px;
  font-weight: 700;
}

/* 🔥 TABLET / BIG SCREEN */
@media (min-width: 600px) {
  .container {
    bottom: 16vh;
    max-width: 500px;
    padding: 25px;
  }

  .login-option img {
    width: 60px;
    height: 60px;
  }

  .login-option p {
    font-size: 16px;
  }
}

/* 🔥 VERY SMALL DEVICES (iPhone SE etc) */
@media (max-width: 350px) {
  .login-option img {
    width: 40px;
    height: 40px;
  }

  .login-option p {
    font-size: 12px;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="logo-block">
    <img src="image/bg-eress-logo.png" alt="Ustra Logo">
  </div>
  <div class="options">

    <div class="login-option" onclick="goToCustomer()">
      <img src="https://img.icons8.com/ios-filled/100/user.png" alt="Customer">
      <p>Customer Login</p>
    </div>

    <div class="login-option" onclick="goToPartner()">
      <img src="https://img.icons8.com/ios-filled/100/shop.png" alt="Partner">
      <p>Business / Salon</p>
    </div>

  </div>
</div>

<script>
function goToCustomer() {
  window.location.href = "customer-login.html";
}
function goToPartner() {
  window.location.href = "partner-login.html";
}
</script>

</body>
</html>
