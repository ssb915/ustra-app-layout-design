<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustra</title>

<style>
:root {
  --bg-dark: #0f0f0f;
  --bg-darker: #080808;
  --text-primary: #ffffff;
  --accent-gold: #e2c275;
  --glass-bg: rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.08);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}

body {
  background: linear-gradient(180deg, #0b0b0b, #121212);
  display: flex;
  justify-content: center;
  min-height: 100dvh;
}

/* 🔥 MAIN WRAPPER */
.landing-screen {
  width: 100%;
  max-width: 480px;
  min-height: 100dvh;
  padding: 28px 18px 50px;

  display: flex;
  align-items: center;
  justify-content: center;
}

/* 🔥 CARD */
.landing {
  width: 100%;
  display: grid;
  gap: 24px;
  text-align: center;

  backdrop-filter: blur(16px);
  background: rgba(255,255,255,0.03);
  border-radius: 26px;
  padding: 26px 20px;

  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

/* 🔥 LOGO */
.logo-block {
  display: grid;
  justify-items: center;
  gap: 12px;
}

.logo-block img {
  width: 90px;
  height: 90px;
  border-radius: 22px;
  background: #fff;
  padding: 14px;

  box-shadow: 0 12px 30px rgba(0,0,0,0.5);
}

/* TAGLINE */
.tagline {
  color: var(--accent-gold);
  font-weight: 600;
  font-size: 14px;
  line-height: 1.5;
}

/* 🔥 OPTIONS */
.options {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}

/* 🔥 CARD BUTTON */
.login-option {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 18px;
  padding: 20px 12px;

  display: grid;
  place-items: center;
  gap: 12px;

  text-decoration: none;
  color: var(--text-primary);

  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}

/* 🔥 GLOW EFFECT */
.login-option::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent, rgba(226,194,117,0.2), transparent);
  opacity: 0;
  transition: 0.3s;
}

.login-option:hover::before {
  opacity: 1;
}

/* HOVER */
.login-option:hover {
  transform: translateY(-6px) scale(1.03);
  border-color: var(--accent-gold);
  box-shadow: 0 18px 30px rgba(0,0,0,0.5);
}

/* ICON BOX */
.icon-wrap {
  width: 58px;
  height: 58px;
  border-radius: 16px;

  background: rgba(226,194,117,0.12);
  display: grid;
  place-items: center;
}

/* ICON */
.login-option img {
  width: 30px;
  height: 30px;

  filter: brightness(0) saturate(100%) invert(78%) sepia(32%) saturate(430%) hue-rotate(12deg) brightness(92%) contrast(92%);
}

/* TEXT */
.login-option p {
  font-weight: 600;
  font-size: 14px;
}

/* 🔥 MOBILE FIX */
@media (max-width: 420px) {
  .options {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="landing-screen">

  <div class="landing">

    <div class="logo-block">
      <img src="image/bg-eress-logo.png">
      <div class="tagline">
        Nayi ki dukan<br>ab apke jeb me
      </div>
    </div>

    <div class="options">

      <a class="login-option" href="customer-login.html">
        <div class="icon-wrap">
          <img src="https://img.icons8.com/ios-filled/100/user.png">
        </div>
        <p>Customer Login</p>
      </a>

      <a class="login-option" href="partner-login.html">
        <div class="icon-wrap">
          <img src="https://img.icons8.com/ios-filled/100/shop.png">
        </div>
        <p>Business / Salon</p>
      </a>

    </div>

  </div>

</div>

</body>
</html>
