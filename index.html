<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustra - Welcome</title>
<link rel="stylesheet" href="customer-style.css">
<style>
  body {
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), url("image/background-img.png") no-repeat center center;
    background-size: cover;
  }
  .welcome-container {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 40px 20px;
    background: linear-gradient(to top, rgba(10,10,10,1) 40%, rgba(10,10,10,0) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .logo-text {
    font-size: 42px;
    font-weight: 800;
    color: var(--accent-gold);
    margin-bottom: 10px;
    letter-spacing: 2px;
  }
  .tagline {
    font-size: 16px;
    color: var(--text-secondary);
    margin-bottom: 40px;
    text-align: center;
  }
  .options {
    display: flex;
    width: 100%;
    gap: 15px;
    max-width: 400px;
  }
</style>
</head>
<body>

<div class="app-container" style="background: transparent; box-shadow: none;">
  <div class="welcome-container">
    <img src="image/bg-eress-logo.png" alt="Ustra Logo" style="height: 60px; object-fit: contain; background: white; padding: 10px; border-radius: 12px; margin-bottom: 5px;">
    <div class="logo-text">USTRA</div>
    <div class="tagline">Premium Grooming Experience</div>
    
    <div class="options">
      <a href="customer-login.html" class="btn-primary" style="flex: 1;">Customer</a>
      <a href="partner-login.html" class="btn-secondary" style="flex: 1;">Partner</a>
    </div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
  lucide.createIcons();
</script>
</body>
</html>
