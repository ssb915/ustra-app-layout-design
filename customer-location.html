<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustra - Location</title>
<link rel="stylesheet" href="customer-style.css">
<style>
  /* Location screen is a standalone step (no bottom navbar), so center content. */
  .app-container {
    padding-bottom: 0;
  }

  .auth-container {
    padding: 20px;
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
    justify-content: center;
    position: relative;
  }

  .top-row {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    position: absolute;
    top: 20px;
    left: 20px;
  }

  .back-link {
    width: 44px;
    height: 44px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    color: var(--accent-gold);
    text-decoration: none;
    transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
  }

  .back-link:hover {
    border-color: rgba(226, 194, 117, 0.6);
    background: rgba(226, 194, 117, 0.08);
  }

  .back-link:active {
    transform: scale(0.96);
  }

  .back-link svg {
    width: 24px;
    height: 24px;
  }

  .auth-header {
    text-align: center;
    margin-bottom: 18px;
    padding-top: 0;
  }

  .logo {
    width: 110px;
    height: 110px;
    border-radius: 22px;
    background: #fff;
    display: grid;
    place-items: center;
    box-shadow: 0 14px 28px rgba(0, 0, 0, 0.25);
    margin: 0 auto 14px;
  }

  .logo img {
    width: 75%;
    height: 100%;
    object-fit: contain;
    filter: none;
  }

  .auth-header h1 {
    font-size: 32px;
    margin-bottom: 10px;
  }

  .auth-form {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .hint {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.4;
    margin-top: -6px;
  }
  .hint:empty {
    display: none;
  }
</style>
</head>
<body>
  <div class="app-container">
    <div class="auth-container">
      <div class="top-row">
        <a class="back-link" href="customer-register.html" aria-label="Back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M19 12H5"></path>
            <path d="M12 19l-7-7 7-7"></path>
          </svg>
        </a>
      </div>

      <div class="auth-header">
        <div class="logo">
          <img src="image/bg-eress-logo.png" alt="Ustra Logo">
        </div>
        <h1>Location</h1>
        <p class="text-muted">Enter your location to continue</p>
      </div>

      <form class="auth-form" id="locationForm">
        <div>
          <input
            id="locationInput"
            type="text"
            class="glass-input"
            placeholder="Location"
            autocomplete="address-level2"
            required
          >
        </div>

        <div class="hint" id="locStatus" aria-live="polite"></div>

        <button class="btn-primary mt-20" type="submit">Continue</button>
      </form>
    </div>
  </div>

  <script>
    (function () {
      const form = document.getElementById("locationForm");
      const locationInput = document.getElementById("locationInput");
      const status = document.getElementById("locStatus");
      let isDetecting = false;
      let attemptedAuto = false;

      function setStatus(text) {
        status.textContent = text || "";
      }

      function dedupeParts(parts) {
        const out = [];
        parts.forEach((part) => {
          const value = String(part || "").trim();
          if (!value) return;
          if (out.includes(value)) return;
          out.push(value);
        });
        return out;
      }

      function formatNominatimAddress(address) {
        const a = address || {};

        const area =
          a.suburb ||
          a.neighbourhood ||
          a.quarter ||
          a.city_district ||
          a.hamlet ||
          a.village ||
          a.town ||
          a.city ||
          "";

        // Nominatim (India) often provides taluka under "county".
        const taluka =
          a.county ||
          "";

        const city =
          a.city ||
          a.town ||
          a.village ||
          a.state_district ||
          a.district ||
          "";

        const state = a.state || a.region || "";

        return dedupeParts([area, taluka, city, state]).join(", ");
      }

      function nominatimReverseGeocodeJsonp(lat, lng) {
        return new Promise((resolve, reject) => {
          const callbackName = "__nominatim_cb_" + Math.random().toString(36).slice(2);
          const script = document.createElement("script");
          const timeout = setTimeout(() => cleanup(new Error("timeout")), 12000);

          function cleanup(error) {
            clearTimeout(timeout);
            delete window[callbackName];
            script.remove();
            if (error) reject(error);
          }

          window[callbackName] = (payload) => {
            try {
              const formatted = formatNominatimAddress(payload && payload.address);
              resolve(formatted);
            } catch (err) {
              reject(err);
            } finally {
              cleanup();
            }
          };

          script.onerror = () => cleanup(new Error("load-error"));
          script.src =
            "https://nominatim.openstreetmap.org/reverse" +
            "?format=json" +
            "&lat=" + encodeURIComponent(lat) +
            "&lon=" + encodeURIComponent(lng) +
            "&zoom=18" +
            "&addressdetails=1" +
            "&json_callback=" + encodeURIComponent(callbackName);

          document.head.appendChild(script);
        });
      }

      async function reverseGeocode(lat, lng) {
        // Prefer Nominatim (better "area" precision); fallback to BigDataCloud if blocked.
        try {
          return await nominatimReverseGeocodeJsonp(lat, lng);
        } catch (_) {
          // ignore
        }

        const url =
          "https://api.bigdatacloud.net/data/reverse-geocode-client" +
          "?latitude=" + encodeURIComponent(lat) +
          "&longitude=" + encodeURIComponent(lng) +
          "&localityLanguage=en";

        const response = await fetch(url, { headers: { Accept: "application/json" } });
        if (!response.ok) {
          throw new Error("Reverse geocode failed");
        }

        const data = await response.json();
        const locality = (data.locality || data.city || "").trim();
        const city = (data.city || "").trim();
        const state = (data.principalSubdivision || "").trim();

        return dedupeParts([locality, city, state]).join(", ");
      }

      function detectLocation() {
        if (!navigator.geolocation) {
          setStatus("Location not supported. Please type your location.");
          return;
        }

        if (isDetecting) {
          return;
        }

        isDetecting = true;
        setStatus("Detecting location...");

        navigator.geolocation.getCurrentPosition(
          function (pos) {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            reverseGeocode(lat, lng)
              .then((label) => {
                const nextValue = String(label || "").trim();
                if (nextValue) {
                  locationInput.value = nextValue;
                  setStatus("");
                } else {
                  setStatus("Unable to detect location. Please type your location.");
                }
              })
              .catch(() => {
                setStatus("Unable to detect location. Please type your location.");
              })
              .finally(() => {
                isDetecting = false;
                locationInput.focus();
              });
          },
          function (error) {
            isDetecting = false;
            if (error && error.code === 1) {
              setStatus("Location permission denied. Please type your location.");
            } else {
              setStatus("Unable to detect location. Please type your location.");
            }
          },
          { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
        );
      }

      // Auto-fill once on load (still allows manual editing).
      if (!locationInput.value.trim()) {
        attemptedAuto = true;
        setTimeout(() => detectLocation(), 300);
      }
      locationInput.addEventListener("focus", function () {
        if (!attemptedAuto && !locationInput.value.trim()) {
          attemptedAuto = true;
          detectLocation();
        }
      });

      form.addEventListener("submit", function (event) {
        event.preventDefault();
        window.location.href = "customer-otp.html?flow=register&next=" + encodeURIComponent("home.html");
      });
    })();
  </script>
</body>
</html>
