<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustra Partner - Bookings</title>
<link rel="stylesheet" href="customer-style.css">
<style>
  .bookings-container { padding: 20px; padding-bottom: 100px; }
  
  .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
  .tab { flex: 1; text-align: center; padding: 10px; background: var(--glass-bg); border-radius: 12px; font-size: 14px; color: var(--text-secondary); cursor: pointer; border: 1px solid var(--glass-border); }
  .tab.active { background: var(--accent-gold); color: #000; font-weight: bold; border-color: var(--accent-gold); }

  .booking-card {
    background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px;
    padding: 15px; margin-bottom: 15px;
  }
  .booking-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px dashed var(--glass-border); padding-bottom: 10px; }
  .booking-card-header h4 { font-size: 16px; color: var(--text-primary); }
  .booking-card-header .time { font-size: 12px; color: var(--accent-gold); font-weight: 600; display: flex; align-items: center; gap: 5px; }
  
  .customer-row { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
  .customer-avatar { width: 40px; height: 40px; background: var(--accent-gold); color: #000; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; margin-bottom: 0; }
  .customer-name { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .customer-phone { font-size: 12px; color: var(--text-secondary); }

  .services-list { font-size: 13px; color: var(--text-secondary); margin-bottom: 15px; }

  .booking-actions { display: flex; gap: 10px; }
  .btn-accept { flex: 1; background: var(--success-color); color: #fff; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
  .btn-decline { flex: 1; background: transparent; color: var(--error-color); border: 1px solid var(--error-color); padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
  
  .status-badge { font-size: 12px; font-weight: bold; padding: 5px 12px; border-radius: 8px; text-transform: uppercase; text-align: center; width: 100%;}
  .status-badge.confirmed { background: rgba(0,204,102,0.1); color: var(--success-color); border: 1px solid rgba(0,204,102,0.3); }
</style>
</head>
<body>

<div class="app-container">

  <header>
    <h1><img src="image/bg-eress-logo.png" alt="Logo" class="top-logo" style="margin-right: 10px; vertical-align: middle;"> Bookings</h1>
    <i data-lucide="calendar"></i>
  </header>

  <div class="bookings-container">
    <div class="tabs">
      <div class="tab active">Requests</div>
      <div class="tab">Upcoming</div>
      <div class="tab">Past</div>
    </div>

    <div class="booking-card">
      <div class="booking-card-header">
        <h4>Today</h4>
        <div class="time"><i data-lucide="clock" style="width:14px;"></i> 10:30 AM</div>
      </div>
      <div class="customer-row">
        <div class="customer-avatar">A</div>
        <div>
          <div class="customer-name">Aman Sharma</div>
          <div class="customer-phone">+91 9876543210</div>
        </div>
      </div>
      <div class="services-list">
        Services: Haircut & Styling ($35)
      </div>
      <div class="booking-actions">
        <button class="btn-decline">Decline</button>
        <button class="btn-accept">Accept</button>
      </div>
    </div>

    <div class="booking-card">
      <div class="booking-card-header">
        <h4>Today</h4>
        <div class="time" style="color: var(--text-secondary);"><i data-lucide="clock" style="width:14px;"></i> 02:00 PM</div>
      </div>
      <div class="customer-row">
        <div class="customer-avatar" style="background: #444; color:#fff;">S</div>
        <div>
          <div class="customer-name">Sanjay Kumar</div>
          <div class="customer-phone">+91 8765432109</div>
        </div>
      </div>
      <div class="services-list">
        Services: Classic Shave ($20)
      </div>
      <div class="booking-actions">
        <div class="status-badge confirmed">Confirmed</div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="partner-dashboard.html" class="nav-item">
      <i data-lucide="layout-dashboard"></i><span>Dashboard</span>
    </a>
    <a href="partner-bookings.html" class="nav-item active"> 
      <i data-lucide="calendar"></i><span>Bookings</span>
    </a>
    <a href="partner-services.html" class="nav-item">
      <i data-lucide="scissors"></i><span>Services</span>
    </a>
    <a href="partner-staff.html" class="nav-item">
      <i data-lucide="users-round"></i><span>Staff</span>
    </a>
    <a href="partner-profile.html" class="nav-item">
      <i data-lucide="store"></i><span>Profile</span>
    </a>
  </nav>

</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
  lucide.createIcons();
  
  // Tab Switching Dummy Logic
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
    });
  });
</script>

</body>
</html>
