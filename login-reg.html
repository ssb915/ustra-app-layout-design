<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustra Login</title>

<style>
body {
  margin: 0;
  height: 100dvh;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(to bottom, #1a1a1a, #2c2c2c);
  display: flex;
  justify-content: center;
  align-items: center;
  color: #fff;
}

.container {
  width: 90%;
  max-width: 350px;
  text-align: center;
}

/* LOGO */
.logo-box {
  width: 140px;
  height: 140px;
  margin: 0 auto 20px;
  background: #fff;
  border-radius: 28px;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 15px 35px rgba(0,0,0,0.5);
}

.logo {
  width: 100%;
  height: 100%;
  object-fit: contain;
  transform: scale(1.5) translateY(6px);
}

/* TEXT */
h2 { margin: 10px 0 0; }
.sub { color: #aaa; margin: 10px 0 25px; }

/* INPUT */
.input-box {
  width: 100%;
  margin-bottom: 12px;
}

.input-box input {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: none;
  outline: none;
  font-size: 15px;
  background: rgba(255,255,255,0.08);
  color: #fff;
  box-sizing: border-box;
}

/* ERROR */
.error {
  color: #ff4d4d;
  font-size: 13px;
  margin-top: 5px;
  display: none;
}

/* BUTTON */
.btn {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  background: #fff;
  color: #000;
  font-weight: 600;
  cursor: pointer;
}

/* SWITCH */
.switch {
  margin-top: 15px;
  color: #aaa;
}

.switch span {
  color: #fff;
  cursor: pointer;
}

/* SUPPORT */
.support {
  margin-top: 15px;
  font-size: 13px;
  color: #888;
}

.support a {
  color: #fff;
  text-decoration: none;
}

</style>
</head>

<body>

<div class="container">

  <div class="logo-box">
    <img src="image/bg-eress-logo.png" class="logo">
  </div>

  <h2>Welcome</h2>
  <div class="sub">Login with Gmail & Password</div>

  <!-- EMAIL -->
  <div class="input-box">
    <input type="text" id="email" placeholder="Enter your Gmail">
  </div>

  <!-- PASSWORD -->
  <div class="input-box">
    <input type="password" id="password" placeholder="Enter your Password">
    <div class="error" id="errorMsg"></div>
  </div>

  <button class="btn" onclick="validateLogin()">Continue</button>

  <div class="switch">
	New user? <span onclick="goToRegister()">Register</span>
  </div>

  <div class="support">
    Need help? <a href="mailto:support@ustra.com">Contact Support</a>
  </div>

</div>

<script>
function validateLogin() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const error = document.getElementById("errorMsg");

  const gmailPattern = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;

  // ❌ email format
  if (!gmailPattern.test(email)) {
    error.style.display = "block";
    error.innerText = "Please add valid Gmail";
    return;
  }

  // ❌ empty password
  if (password === "") {
    error.style.display = "block";
    error.innerText = "Password is required";
    return;
  }

  // ❌ wrong credentials
  if (email !== "ustra123@gmail.com" || password !== "123456") {
    error.style.display = "block";
    error.innerText = "Invalid email or password";
    return;
  }

  // ✅ success
  error.style.display = "none";
  alert("Login Successful 🚀");
   
}
function goToRegister() {
  window.location.href = "gender-select.html"; // 👈 yaha apni file ka naam dal
}
</script>

</body>
</html>
