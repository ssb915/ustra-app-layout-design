<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustra - My Bookings</title>

<style>
  /* 🔥 RESET & BASE STYLES */
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { background-color: #f4f4f4; display: flex; justify-content: center; }

  /* 🔥 APP CONTAINER */
  .app-container {
    width: 100%; max-width: 480px; background-color: #ffffff; min-height: 100dvh;
    position: relative; padding-bottom: 80px; box-shadow: 0 0 20px rgba(0,0,0,0.1); overflow-x: hidden;
  }

  /* 🔥 HEADER */
  header {
    padding: 20px; background: #fff; position: sticky; top: 0; z-index: 10;
    border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 22px; font-weight: 700; color: #000; }

  /* 🔥 BOOKINGS CONTENT */
  .bookings-container { padding: 20px 0; }
  
  .booking-card {
    background: #fff; border: 1px solid #eaeaea; border-radius: 16px;
    margin: 0 20px 15px 20px; padding: 15px; display: flex; gap: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04); transition: 0.2s;
  }
  .booking-card:hover { border-color: #000; }
  
  .booking-date { 
    background: #000; color: #fff; border-radius: 12px; padding: 10px; 
    text-align: center; min-width: 65px; display: flex; flex-direction: column; justify-content: center;
  }
  .booking-date span { font-size: 12px; text-transform: uppercase; }
  .booking-date strong { font-size: 20px; }
  
  .booking-details { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .booking-details h4 { margin-bottom: 5px; font-size: 16px; color: #000; }
  .booking-details p { font-size: 13px; color: #666; margin-bottom: 8px; }
  
  .status { 
    font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 8px; align-self: flex-start;
  }
  .status.upcoming { background: #e0f2f1; color: #00897b; }
  .status.completed { background: #f5f5f5; color: #666; }
  .status.cancelled { background: #ffebee; color: #c62828; }

  /* 🔥 UPDATED BLACK BOTTOM NAVBAR */
  .bottom-nav {
    position: fixed; bottom: 0; width: 100%; max-width: 480px; background: black;
    display: flex; justify-content: space-around; align-items: center;
    padding: 12px 10px; height: 75px; z-index: 100;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-decoration: none; color: grey; transition: all 0.2s ease;
    width: 30%; height: 100%; border-radius: 12px;
  }
  .nav-item:active { background-color: #222; }
  .nav-item.active, .nav-item:hover { color: white; }
  
  .nav-item .lucide {
    width: 24px; height: 24px; stroke-width: 1.5px; margin-bottom: 5px; transition: stroke-width 0.2s ease;
  }
  .nav-item.active .lucide { stroke-width: 2.5px; }
  
  .nav-item span { font-size: 11px; font-weight: 500; }
  .nav-item.active span { font-weight: 600; }
</style>

<script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<div class="app-container">

  <header>
    <h1>My Bookings</h1>
    <i data-lucide="bell" style="width: 24px;"></i>
  </header>

  <div class="bookings-container">
    <div class="booking-card">
      <div class="booking-date"><span>Mar</span><strong>28</strong></div>
      <div class="booking-details">
        <h4>Haircut & Beard Trim</h4>
        <p>Urban Trim Salon • 10:30 AM</p>
        <span class="status upcoming">Upcoming</span>
      </div>
    </div>

    <div class="booking-card">
      <div class="booking-date" style="background: #e0e0e0; color: #333;"><span>Mar</span><strong>15</strong></div>
      <div class="booking-details">
        <h4>Facial & Relaxing Spa</h4>
        <p>Elegance Spa • 4:00 PM</p>
        <span class="status completed">Completed</span>
      </div>
    </div>
    
    <div class="booking-card">
      <div class="booking-date" style="background: #e0e0e0; color: #333;"><span>Feb</span><strong>02</strong></div>
      <div class="booking-details">
        <h4>Classic Shave</h4>
        <p>The Classic Cut • 1:00 PM</p>
        <span class="status cancelled">Cancelled</span>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="home.html" class="nav-item">
      <i data-lucide="home"></i>
      <span>Home</span>
    </a>
    <a href="bookings.html" class="nav-item active"> 
      <i data-lucide="calendar-days"></i>
      <span>Bookings</span>
    </a>
    <a href="profile.html" class="nav-item">
      <i data-lucide="user"></i>
      <span>Profile</span>
    </a>
  </nav>

</div>

<script>
  lucide.createIcons();
</script>

</body>
</html>
