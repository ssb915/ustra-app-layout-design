<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookings - Barber Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root { --primary: #1e40af; --surface: #fafafa; }
    body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--surface); -webkit-tap-highlight-color: transparent; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="pb-24">

  <div class="max-w-md mx-auto min-h-screen bg-white shadow-sm">
    
    <header class="bg-white px-4 pt-5 pb-3 sticky top-0 z-40 border-b border-zinc-100">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-lg bg-blue-800 flex items-center justify-center">
            <i data-lucide="calendar" class="w-4 h-4 text-white"></i>
          </div>
          <h1 class="text-xl font-bold text-zinc-900 tracking-tight">My Bookings</h1>
        </div>
        <button onclick="toggleDrawer()" class="w-9 h-9 rounded-full bg-zinc-50 flex items-center justify-center border border-zinc-200 hover:bg-zinc-100 transition-colors">
          <i data-lucide="menu" class="w-5 h-5 text-zinc-700"></i>
        </button>
      </div>
    </header>

    <main class="px-4 py-4 space-y-5">

      <div class="flex p-1 bg-zinc-100 rounded-xl">
        <button class="flex-1 py-2 bg-white text-zinc-900 font-semibold text-sm rounded-lg shadow-sm transition-all">Upcoming</button>
        <button class="flex-1 py-2 text-zinc-500 font-medium text-sm rounded-lg hover:text-zinc-900 transition-all">Past</button>
      </div>

      <div class="bg-white border border-blue-100 rounded-2xl p-4 shadow-sm shadow-blue-50 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-1 h-full bg-amber-400"></div>
        <div class="flex justify-between items-start mb-3">
          <div>
            <span class="inline-flex items-center gap-1 px-2 py-1 bg-amber-50 text-amber-700 text-[10px] font-bold uppercase tracking-wider rounded-md mb-2">
              <i data-lucide="clock-4" class="w-3 h-3"></i> Pending Time
            </span>
            <h3 class="font-bold text-zinc-900">Premium Barbers</h3>
            <p class="text-xs text-zinc-500 mt-0.5">Classic Haircut + Beard Trim</p>
          </div>
          <div class="text-right">
            <p class="text-sm font-bold text-zinc-900">₹450</p>
          </div>
        </div>
        
        <div class="bg-zinc-50 rounded-xl p-3 flex items-center justify-between border border-zinc-100">
          <div class="flex items-center gap-2">
            <i data-lucide="calendar-days" class="w-4 h-4 text-blue-800"></i>
            <span class="text-xs font-medium text-zinc-700">Waiting for Barber to assign time</span>
          </div>
        </div>
      </div>

      <div class="bg-white border border-emerald-100 rounded-2xl p-4 shadow-sm relative overflow-hidden">
        <div class="absolute top-0 left-0 w-1 h-full bg-emerald-500"></div>
        <div class="flex justify-between items-start mb-3">
          <div>
            <span class="inline-flex items-center gap-1 px-2 py-1 bg-emerald-50 text-emerald-700 text-[10px] font-bold uppercase tracking-wider rounded-md mb-2">
              <i data-lucide="check-circle" class="w-3 h-3"></i> Confirmed
            </span>
            <h3 class="font-bold text-zinc-900">Style Lounge</h3>
            <p class="text-xs text-zinc-500 mt-0.5">Facial Cleanup</p>
          </div>
        </div>
        
        <div class="bg-emerald-50/50 rounded-xl p-3 flex items-center justify-between border border-emerald-100">
          <div class="flex items-center gap-3">
            <div class="bg-white p-2 rounded-lg border border-emerald-100 text-center min-w-[3rem]">
              <p class="text-[10px] text-zinc-500 uppercase font-bold leading-none">Nov</p>
              <p class="text-lg font-bold text-emerald-700 leading-tight">24</p>
            </div>
            <div>
              <p class="text-sm font-bold text-zinc-900">4:30 PM</p>
              <p class="text-[10px] text-zinc-500 mt-0.5">Please arrive 5 mins early</p>
            </div>
          </div>
          <button class="p-2 bg-white rounded-full border border-emerald-200 text-emerald-600 hover:bg-emerald-50">
            <i data-lucide="map" class="w-4 h-4"></i>
          </button>
        </div>
      </div>

    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-zinc-100 px-8 py-3 z-30">
      <div class="max-w-md mx-auto flex justify-between items-center">
        <a href="index.html" class="flex flex-col items-center gap-1 cursor-pointer w-16 opacity-50 hover:opacity-100 transition-opacity">
          <i data-lucide="home" class="w-6 h-6 text-zinc-600"></i>
          <span class="text-[10px] font-medium text-zinc-600">Home</span>
        </a>
        <a href="bookings.html" class="flex flex-col items-center gap-1 cursor-pointer w-16">
          <i data-lucide="calendar" class="w-6 h-6 text-blue-800 fill-blue-50"></i>
          <span class="text-[10px] font-semibold text-blue-800">Bookings</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center gap-1 cursor-pointer w-16 opacity-50 hover:opacity-100 transition-opacity">
          <i data-lucide="user" class="w-6 h-6 text-zinc-600"></i>
          <span class="text-[10px] font-medium text-zinc-600">Profile</span>
        </a>
      </div>
    </div>

  </div>

  <div id="drawer-overlay" onclick="toggleDrawer()" class="fixed inset-0 bg-zinc-900/60 z-[60] opacity-0 pointer-events-none transition-opacity duration-300"></div>
  <div id="side-drawer" class="fixed top-0 right-0 h-full w-[80%] max-w-sm bg-white z-[70] transform translate-x-full transition-transform duration-300 shadow-2xl flex flex-col">
    <div class="px-6 py-5 border-b border-zinc-100 flex items-center justify-between bg-zinc-50">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-zinc-200 flex items-center justify-center">
          <i data-lucide="user" class="w-5 h-5 text-zinc-600"></i>
        </div>
        <div>
          <h3 class="font-bold text-zinc-900">Arjun</h3>
          <p class="text-xs text-zinc-500">+91 98765 43210</p>
        </div>
      </div>
      <button onclick="toggleDrawer()" class="p-2 bg-white rounded-full shadow-sm border border-zinc-200 hover:bg-zinc-100">
        <i data-lucide="x" class="w-4 h-4 text-zinc-600"></i>
      </button>
    </div>
    <div class="flex-1 overflow-y-auto py-4 px-4 space-y-2">
      <button onclick="drawerAlert('Account Settings')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-zinc-50 transition-colors text-left">
        <i data-lucide="settings" class="w-5 h-5 text-zinc-500"></i><span class="text-sm font-medium text-zinc-700">Account Settings</span>
      </button>
      <button onclick="drawerAlert('Help & Support')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-zinc-50 transition-colors text-left">
        <i data-lucide="help-circle" class="w-5 h-5 text-zinc-500"></i><span class="text-sm font-medium text-zinc-700">Help & Support</span>
      </button>
    </div>
    <div class="p-4 border-t border-zinc-100">
      <button onclick="toggleDrawer()" class="w-full flex items-center justify-center gap-2 p-3 bg-red-50 text-red-600 rounded-xl hover:bg-red-100 transition-colors font-medium text-sm">
        <i data-lucide="log-out" class="w-4 h-4"></i>Log Out
      </button>
    </div>
  </div>

  <script>
    function toggleDrawer() {
      const drawer = document.getElementById('side-drawer');
      const overlay = document.getElementById('drawer-overlay');
      drawer.classList.toggle('translate-x-full');
      if (overlay.classList.contains('opacity-0')) {
        overlay.classList.remove('opacity-0', 'pointer-events-none');
        overlay.classList.add('opacity-100');
      } else {
        overlay.classList.remove('opacity-100');
        overlay.classList.add('opacity-0', 'pointer-events-none');
      }
    }
    function drawerAlert(pageName) { alert(`${pageName} page will be available in the final app.`); toggleDrawer(); }
    lucide.createIcons();
  </script>
</body>
</html>
