<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustra - My Bookings</title>
<link rel="stylesheet" href="customer-style.css">
<style>

/* ═══════════════════════════════════════════
   PAGE LAYOUT
═══════════════════════════════════════════ */
.bookings-container { padding: 155px 0 100px 0; }

/* Fixed header */
.fixed-top-section {
  position: fixed; top: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px; z-index: 2000;
  background: rgba(13,13,13,0.98);
  backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
  border-bottom: 1px solid var(--glass-border);
}
.bookings-header { display: flex; align-items: center; height: 75px; padding: 0 10px; gap: 2px; }
.bookings-header h2 { font-size: 21px; font-weight: 800; color: #fff; letter-spacing: -0.5px; margin-left: -5px; }
.back-btn { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; color: #fff; }

.tabs-container { display: flex; padding: 0 20px 25px 20px; gap: 12px; }
.tab-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.03); color: var(--text-secondary); font-size: 13px; font-weight: 700; transition: 0.3s; cursor: pointer; }
.tab-btn.active { background: var(--accent-gold); color: #000; border-color: var(--accent-gold); box-shadow: 0 4px 15px rgba(212,175,55,0.3); }

.booking-list { display: none; padding-top: 15px; }
.booking-list.active { display: block; }

/* ═══════════════════════════════════════════
   STATUS BADGES  (shared)
═══════════════════════════════════════════ */
.p-status {
  font-size: 9px; font-weight: 900; padding: 4px 10px; border-radius: 20px;
  text-transform: uppercase; letter-spacing: 1px;
  border-width: 1px; border-style: solid;
  text-align: center; white-space: nowrap; display: inline-block;
}
.p-status.upcoming  { background: rgba(212,175,55,0.15); color: var(--accent-gold); border-color: rgba(212,175,55,0.3); }
.p-status.confirmed { background: rgba(0,153,255,0.15);  color: #0099ff;            border-color: rgba(0,153,255,0.3); }
.p-status.cancelled { background: rgba(255,77,77,0.10);  color: #ff4d4d;            border-color: rgba(255,77,77,0.3); }
.p-status.rejected  { background: rgba(255,255,255,0.05);color: #888;               border-color: rgba(255,255,255,0.1); }
.p-status.completed { background: rgba(76,175,80,0.15);  color: #4CAF50;            border-color: rgba(76,175,80,0.3); }

/* Premium pulse animation */
@keyframes premium-pulse {
  0% { box-shadow: 0 0 0 0 rgba(226, 194, 117, 0.5); }
  70% { box-shadow: 0 0 0 12px rgba(226, 194, 117, 0); }
  100% { box-shadow: 0 0 0 0 rgba(226, 194, 117, 0); }
}

/* Call button (shared) */
.call-btn-small {
  width: 44px; height: 44px; background: var(--accent-gold); color: #000 !important;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 6px 15px rgba(212,175,55,0.3); transition: all 0.3s ease; text-decoration: none !important;
  flex-shrink: 0; animation: premium-pulse 2.5s infinite;
}
.call-btn-small i { color: #000 !important; width: 17px; height: 17px; stroke-width: 2.5px; }
.call-btn-small:hover { transform: scale(1.06); filter: brightness(1.1); }
.call-btn-small:active { transform: scale(0.94); }

/* ═══════════════════════════════════════════
   PENDING TAB — SIMPLE HORIZONTAL CARD
═══════════════════════════════════════════ */
.p-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  margin: 0 15px 14px 15px;
  padding: 14px;
  display: flex;
  align-items: stretch;
  gap: 13px;
  transition: 0.3s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 6px 24px rgba(0,0,0,0.2);
}
.p-card:hover { border-color: rgba(212,175,55,0.25); background: rgba(255,255,255,0.06); transform: translateY(-2px); }

/* Shop thumbnail */
.p-thumb {
  width: 82px; height: 82px;
  border-radius: 14px; overflow: hidden;
  flex-shrink: 0; border: 1px solid var(--glass-border);
  align-self: center;
}
.p-thumb img { width: 100%; height: 100%; object-fit: cover; }

/* Info column */
.p-body { flex: 1; display: flex; flex-direction: column; justify-content: center; min-width: 0; }
.p-service { font-size: 14px; font-weight: 800; color: #fff; line-height: 1.3; margin-bottom: 3px; }
.p-shop    { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.75); margin-bottom: 3px; }
.p-meta    { font-size: 11px; color: var(--text-secondary); margin-bottom: 3px; display: flex; align-items: center; gap: 4px; }
.p-meta i  { width: 11px; height: 11px; color: var(--accent-gold); flex-shrink: 0; }
.p-loc     { font-size: 10.5px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; margin-bottom: 6px; }
.p-loc i   { width: 11px; height: 11px; color: var(--accent-gold); flex-shrink: 0; }
.p-price {
  font-size: 16px; font-weight: 950; color: var(--accent-gold);
  display: flex; align-items: baseline; gap: 2px;
  text-shadow: 0 0 12px rgba(212,175,55,0.15);
}
.p-price span { font-size: 10px; font-weight: 700; opacity: 0.8; }

/* Right actions */
.p-actions {
  display: flex; flex-direction: column;
  justify-content: space-between; align-items: flex-end;
  flex-shrink: 0; gap: 8px;
}

/* ═══════════════════════════════════════════
   APPROVED TAB — DETAILED BANNER CARD
═══════════════════════════════════════════ */
.a-card {
  background: rgba(18,18,18,0.9);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  margin: 0 15px 14px 15px;
  overflow: hidden;
  display: flex; flex-direction: column;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), border-color 0.3s;
  box-shadow: 0 8px 28px rgba(0,0,0,0.5);
}
.a-card:hover { transform: translateY(-2px); border-color: rgba(212,175,55,0.3); }

/* — Banner — */
.a-banner {
  position: relative; width: 100%; height: 115px;
  overflow: hidden; flex-shrink: 0;
}
.a-banner img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: transform 0.5s ease;
}
.a-card:hover .a-banner img { transform: scale(1.04); }
.a-banner::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 70px;
  background: linear-gradient(to bottom, transparent, rgba(18,18,18,1));
  pointer-events: none;
}
.a-banner-top {
  position: absolute; top: 10px; left: 10px; z-index: 5;
}
.a-banner-call {
  position: absolute; top: 12px; right: 12px; z-index: 10;
  width: 44px; height: 44px;
  background: var(--accent-gold);
  border: none;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #000 !important; text-decoration: none;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
  animation: premium-pulse 2.5s infinite;
}
.a-banner-call:hover { 
  background: #fff; 
  color: #000; 
  transform: scale(1.1); 
  box-shadow: 0 0 25px rgba(255, 255, 255, 0.3); 
}
.a-banner-call i { width: 20px; height: 20px; stroke-width: 2.5; color: #000; }
.a-banner-top .p-status {
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  background-color: rgba(0,0,0,0.55) !important;
  border-color: rgba(255,255,255,0.18) !important;
  font-size: 10px; padding: 5px 12px;
}

/* — Card Body — */
.a-body {
  padding: 10px 13px 12px 13px;
  display: flex; flex-direction: column; gap: 8px;
}

/* Services chips */
.a-services { display: flex; flex-wrap: wrap; align-items: center; gap: 5px; }
.a-chip {
  padding: 3px 9px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.11);
  border-radius: 30px;
  font-size: 11.5px; font-weight: 800; color: #fff; white-space: nowrap;
}
.a-sep { font-size: 13px; font-weight: 900; color: var(--accent-gold); opacity: 0.8; flex-shrink: 0; }

/* Staff row */
.a-staff {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 10px 12px;
  background: rgba(212,175,55,0.06);
  border: 1px solid rgba(212,175,55,0.15);
  border-radius: 14px;
}
.a-staff-left { display: flex; align-items: center; gap: 12px; }
.a-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  border: 2px solid var(--accent-gold);
  box-shadow: 0 0 10px rgba(212,175,55,0.35);
  overflow: hidden; flex-shrink: 0; background: #111;
}
.a-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top center; display: block; }
.a-staff-info { display: flex; flex-direction: column; gap: 2px; }
.a-staff-label { font-size: 8.5px; font-weight: 700; color: rgba(255,255,255,0.22); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: -1px; }
.a-staff-name  { font-size: 14px; font-weight: 800; color: #fff; }
.a-staff-role  { font-size: 11px; font-weight: 500; color: var(--accent-gold); opacity: 0.8; }

.a-staff-right { text-align: right; }
.a-staff-price-label { font-size: 8px; font-weight: 800; color: rgba(255,255,255,0.25); text-transform: uppercase; letter-spacing: 1px; }
.a-staff-price-tag {
  font-size: 20px; font-weight: 950; color: var(--accent-gold);
  letter-spacing: -0.5px;
  text-shadow: 0 0 15px rgba(212,175,55,0.3);
  display: flex; align-items: baseline; justify-content: flex-end; gap: 2px;
}
.a-staff-price-tag span { font-size: 12px; font-weight: 700; opacity: 0.8; }

/* Details block */
.a-details {
  display: flex; flex-direction: column; gap: 0;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 11px; overflow: hidden;
}
.a-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 11px;
  font-size: 11.5px; color: rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.025);
}
.a-row + .a-row { border-top: 1px solid rgba(255,255,255,0.06); }
.a-row i { width: 12px; height: 12px; flex-shrink: 0; color: var(--accent-gold); }
.a-row-text { display: flex; flex-direction: column; gap: 0px; flex: 1; }
.a-row-label { font-size: 8.5px; font-weight: 700; color: rgba(255,255,255,0.25); text-transform: uppercase; letter-spacing: 0.7px; }

/* Two-column split row (Date | Location) */
.a-row-split {
  display: flex;
  align-items: stretch;
  padding: 0;
  gap: 0;
}
.a-split-col {
  flex: 1;
  display: flex;
  align-items: flex-start;
  gap: 7px;
  padding: 7px 11px;
  min-width: 0;
}
.a-split-divider {
  width: 1px;
  background: rgba(255,255,255,0.07);
  flex-shrink: 0;
  align-self: stretch;
}
/* Clickable map */
a.a-map-link {
  display: flex; flex-direction: column; gap: 1px; flex: 1;
  color: inherit; text-decoration: none; transition: color 0.2s;
}
a.a-map-link:hover .a-map-addr { color: var(--accent-gold); text-decoration: underline; text-underline-offset: 2px; }
.a-map-hint { font-size: 9px; font-weight: 700; color: rgba(100,180,255,0.65); text-transform: uppercase; letter-spacing: 0.6px; }
a.a-map-link:hover .a-map-hint { color: #4db8ff; }

.a-price-group {
  display: flex; flex-direction: column; gap: 2px;
  padding: 6px 12px;
  background: rgba(212,175,55,0.08);
  border-radius: 10px;
  border: 1px solid rgba(212,175,55,0.1);
  box-shadow: 0 0 15px rgba(212,175,55,0.05);
}
.a-price-label { font-size: 8px; font-weight: 800; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px; }
.a-price-tag {
  font-size: 24px; font-weight: 950; color: var(--accent-gold);
  letter-spacing: -0.5px;
  text-shadow: 0 0 20px rgba(212,175,55,0.4);
  display: flex; align-items: baseline; gap: 3px;
}
.a-price-tag span { font-size: 14px; font-weight: 700; opacity: 0.8; }
.a-footer-btns { display: flex; align-items: center; gap: 7px; }

/* Show Code button */
.a-code-btn {
  padding: 7px 11px;
  background: rgba(0,153,255,0.12);
  border: 1px solid rgba(0,153,255,0.3);
  border-radius: 9px;
  color: #0099ff;
  font-size: 10.5px; font-weight: 800;
  cursor: pointer; display: flex; align-items: center; gap: 5px;
  transition: all 0.2s; white-space: nowrap;
}
.a-code-btn svg { width: 13px; height: 13px; stroke: #0099ff; stroke-width: 2.5; fill: none; flex-shrink: 0; }
.a-code-btn:hover { background: rgba(0,153,255,0.22); transform: translateY(-1px); }
.a-code-btn:active { transform: scale(0.96); }

/* Completed = verified badge inside footer */
.a-verified-badge {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 9px;
  background: rgba(76,175,80,0.12);
  border: 1px solid rgba(76,175,80,0.25);
  border-radius: 9px;
}
.a-check-circle {
  width: 14px; height: 14px; background: #4CAF50; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.a-check-circle svg { width: 8px; height: 8px; stroke: #fff; stroke-width: 3; fill: none; }
.a-verified-txt { font-size: 9.5px; font-weight: 700; color: #4CAF50; }

/* ── Show Code button (Confirmed card footer) ── */
.a-code-btn {
  padding: 7px 11px;
  background: rgba(0,153,255,0.12);
  border: 1px solid rgba(0,153,255,0.3);
  border-radius: 9px;
  color: #0099ff;
  font-size: 10.5px; font-weight: 800;
  cursor: pointer; display: flex; align-items: center; gap: 5px;
  transition: all 0.2s; white-space: nowrap;
}
.a-code-btn svg { width: 12px; height: 12px; stroke: #0099ff; stroke-width: 2.5; fill: none; flex-shrink: 0; }
.a-code-btn:hover { background: rgba(0,153,255,0.22); transform: translateY(-1px); }
.a-code-btn:active { transform: scale(0.96); }

/* ── Verification Code Modal ── */
.vc-overlay {
  display: none; position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  align-items: flex-end; justify-content: center;
  padding-bottom: 76px;
}
.vc-overlay.open { display: flex; animation: vcFadeIn 0.18s ease; }
@keyframes vcFadeIn { from { opacity: 0; } to { opacity: 1; } }
.vc-sheet {
  background: #1c1c1c;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 22px 22px 18px 18px;
  width: calc(100% - 30px); max-width: 420px;
  overflow: hidden;
  animation: vcSlideUp 0.25s cubic-bezier(0.34,1.4,0.64,1);
}
@keyframes vcSlideUp { from { transform: translateY(36px); opacity:0; } to { transform: translateY(0); opacity:1; } }
.vc-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.vc-title {
  font-size: 13px; font-weight: 800; color: #fff;
  display: flex; align-items: center; gap: 7px;
}
.vc-title svg { width: 14px; height: 14px; stroke: var(--accent-gold); stroke-width: 2; fill: none; }
.vc-close {
  width: 28px; height: 28px; border-radius: 50%; border: none;
  background: rgba(255,255,255,0.08); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: 0.2s;
}
.vc-close:hover { background: rgba(255,255,255,0.15); }
.vc-close svg { width: 13px; height: 13px; stroke: #fff; stroke-width: 2.5; fill: none; }
.vc-body { padding: 18px 16px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
.vc-digits { display: flex; gap: 6px; }
.vc-digit {
  width: 40px; height: 50px;
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.14);
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 900; color: #fff;
  font-family: 'Courier New', monospace;
}
.vc-hint { font-size: 10.5px; color: rgba(255,255,255,0.3); text-align: center; line-height: 1.6; }
.vc-footer { padding: 0 16px 16px; }
.vc-close-btn {
  width: 100%; padding: 11px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px; color: rgba(255,255,255,0.6);
  font-size: 13px; font-weight: 700; cursor: pointer; transition: 0.2s;
}
.vc-close-btn:hover { background: rgba(255,255,255,0.1); }

</style>
</head>

<div class="app-container">

  <!-- Fixed Header -->
  <div class="fixed-top-section">
    <div class="bookings-header">
      <a href="home.html" class="back-btn"><i data-lucide="chevron-left"></i></a>
      <h2>My Bookings</h2>
    </div>
    <div class="tabs-container">
      <button class="tab-btn active" onclick="switchTab('pending')">Pending</button>
      <button class="tab-btn"        onclick="switchTab('approved')">Approved</button>
    </div>
  </div>

  <div class="bookings-container">

    <!-- ═══════ PENDING TAB ═══════ (JS renders here) -->
    <div id="pending-list" class="booking-list active">
      <div id="pending-cards-container"></div>
    </div><!-- /pending-list -->

    <!-- ═══════ APPROVED TAB ═══════ (JS renders here) -->
    <div id="approved-list" class="booking-list">
      <div id="approved-cards-container"></div>
    </div>

  </div><!-- /bookings-container -->

  <nav class="bottom-nav">
    <a href="home.html"     class="nav-item"><i data-lucide="home"></i><span>Home</span></a>
    <a href="bookings.html" class="nav-item active"><i data-lucide="calendar"></i><span>Bookings</span></a>
    <a href="profile.html"  class="nav-item"><i data-lucide="user"></i><span>Profile</span></a>
  </nav>

</div><!-- /app-container -->



<!-- Verification Code Modal -->
<div class="vc-overlay" id="vcModal" onclick="vcClose(event)">
  <div class="vc-sheet">
    <div class="vc-head">
      <span class="vc-title">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Verification Code
      </span>
      <button class="vc-close" onclick="vcClose()"><svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="vc-body">
      <div class="vc-digits" id="vc-digits"></div>
      <p class="vc-hint">Show this code to your barber at the time of service to confirm completion.</p>
    </div>
    <div class="vc-footer">
      <button class="vc-close-btn" onclick="vcClose()">Close</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest"></script>

    id: 'BK-002',
    status: 'completed',
    shopImg: 'https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?auto=format&fit=crop&w=600&q=80',
    shopName: 'Enrich Salon &amp; Spa',
    shopNamePlain: 'Enrich Salon & Spa',
    shopQuery: 'Enrich+Salon+Spa+Gomti+Nagar+Lucknow',
    services: ['Full Face Facial', 'Deep Cleanup', 'Head Massage'],
    staffImg: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=150&q=80',
    staffName: 'Priya Kapoor',
    staffRole: 'Spa Therapist',
    date: 'Mar 15, 2026',
    time: '04:00 PM',
    location: 'Gomti Nagar, Lucknow',
    phone: '+919876543210',
    price: '\u20b9 1,200',
    verifyCode: '847392'
  }
];

/* ─── localStorage helpers ─── */
function loadCodes() {
  try { return JSON.parse(localStorage.getItem('ustraCodes') || '{}'); } catch { return {}; }
}
function saveCode(id, code) {
  const m = loadCodes(); m[id] = code;
  localStorage.setItem('ustraCodes', JSON.stringify(m));
}
function gen6() { return String(Math.floor(100000 + Math.random() * 900000)); }

/* ─── Utils ─── */
function formatPrice(priceStr) {
  // Handles "₹ 750" or "₹750"
  const symbol = priceStr.match(/[^\d\s,]+/)?.[0] || '₹';
  const amount = priceStr.replace(/[^\d,]+/g, '');
  return `<span>${symbol}</span>${amount}`;
}

/* ─── Render one pending card ─── */
function renderPendingCard(b) {
  return `
    <div class="p-card">
      <div class="p-thumb">
        <img src="${b.shopThumb}" alt="Shop">
      </div>
      <div class="p-body">
        <div class="p-service">${b.service}</div>
        <div class="p-shop">${b.shop}</div>
        <div class="p-meta"><i data-lucide="calendar"></i> ${b.date} · ${b.time}</div>
        <div class="p-loc"><i data-lucide="map-pin"></i> ${b.location}</div>
        <div class="p-price">${formatPrice(b.price)}</div>
      </div>
      <div class="p-actions">
        <span class="p-status ${b.status}">${b.status.charAt(0).toUpperCase() + b.status.slice(1)}</span>
        <a href="tel:${b.phone}" class="call-btn-small"><i data-lucide="phone"></i></a>
      </div>
    </div>`;
}

/* ─── Render one approved card ─── */
function renderCard(b) {
  const saved = loadCodes();
  if (b.status === 'confirmed') {
    b.verifyCode = saved[b.id] || b.verifyCode || (() => { const c = gen6(); saveCode(b.id, c); return c; })();
  }

  const isConfirmed = b.status === 'confirmed';
  const badgeCls = isConfirmed ? 'confirmed' : 'completed';
  const badgeTxt = isConfirmed ? 'Confirmed'  : 'Completed';

  const chips = b.services
    .map(s => `<span class="a-chip">${s}</span>`)
    .join('<span class="a-sep">+</span>');

  // Footer logic (Verified badge only, call moved to banner)
  let footerRight = '';
  if (!isConfirmed) {
    footerRight = `
      <div class="a-verified-badge">
        <div class="a-check-circle"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></div>
        <span class="a-verified-txt">Verified</span>
      </div>`;
  }

  // Show Code button for the shop row
  const showCodeBtn = isConfirmed ? `
    <button class="a-code-btn" onclick="vcOpen('${b.id}')" style="margin-left: auto;">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Show Code
    </button>` : '';

  // Format price with smaller symbol
  const priceHTML = formatPrice(b.price);

  return `
    <div class="a-card" id="card-${b.id}">
      <div class="a-banner">
        <img src="${b.shopImg}" alt="${b.shopNamePlain}">
        <div class="a-banner-top"><span class="p-status ${badgeCls}">${badgeTxt}</span></div>
        <a href="tel:${b.phone}" class="a-banner-call"><i data-lucide="phone"></i></a>
      </div>
      <div class="a-body">
        <div class="a-services">${chips}</div>
        <div class="a-staff">
          <div class="a-staff-left">
            <div class="a-avatar"><img src="${b.staffImg}" alt="${b.staffName}"></div>
            <div class="a-staff-info">
              <span class="a-staff-label">Barber</span>
              <div class="a-staff-name">${b.staffName}</div>
              <div class="a-staff-role">${b.staffRole}</div>
            </div>
          </div>
          <div class="a-staff-right">
            <span class="a-staff-price-label">Price</span>
            <div class="a-staff-price-tag">${priceHTML}</div>
          </div>
        </div>
        <div class="a-details">
          <div class="a-row" style="display: flex; align-items: center; justify-content: space-between; gap: 10px;">
            <div style="display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0;">
              <i data-lucide="store"></i>
              <div class="a-row-text">
                <span class="a-row-label">Shop</span>
                <span style="display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${b.shopName}</span>
              </div>
            </div>
            ${showCodeBtn}
          </div>
          <div class="a-row a-row-split">
            <div class="a-split-col">
              <i data-lucide="calendar"></i>
              <div class="a-row-text">
                <span class="a-row-label">Date &amp; Time</span>
                <span style="font-size: 11px;">${b.date}</span>
                <span style="font-size: 10px; color: rgba(255,255,255,0.5);">${b.time}</span>
              </div>
            </div>
            <div class="a-split-divider"></div>
            <div class="a-split-col" style="align-items: center; justify-content: center; padding: 4px 0;">
              <a class="a-map-link" href="https://www.google.com/maps/search/?api=1&query=${b.shopQuery}" target="_blank" rel="noopener" style="display: flex; flex-direction: column; align-items: center; gap: 4px; text-decoration: none;">
                <i data-lucide="map-pin" style="width: 18px; height: 18px; color: var(--accent-gold);"></i>
                <span style="font-size: 11px; font-weight: 800; color: var(--accent-gold); text-transform: uppercase; letter-spacing: 0.8px;">Map</span>
              </a>
            </div>
          </div>
        </div>
        <div class="a-footer" style="padding: 5px 0 0 0; background: none; border: none; display: flex; justify-content: flex-end;">
          <div class="a-footer-btns">${footerRight}</div>
        </div>
      </div>
    </div>`;
}

/* ─── Modal open/close ─── */
function vcOpen(id) {
  const b = approvedBookings.find(x => x.id === id);
  if (!b || !b.verifyCode) return;
  document.getElementById('vc-digits').innerHTML =
    b.verifyCode.split('').map(d => `<div class="vc-digit">${d}</div>`).join('');
  document.getElementById('vcModal').classList.add('open');
}
function vcClose(e) {
  if (e && e.target !== document.getElementById('vcModal')) return;
  document.getElementById('vcModal').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') vcClose(); });

function renderApproved() {
  const el = document.getElementById('approved-cards-container');
  if (el) el.innerHTML = approvedBookings.map(renderCard).join('');
}

function renderPending() {
  const el = document.getElementById('pending-cards-container');
  if (el) el.innerHTML = pendingBookings.map(renderPendingCard).join('');
}

function initBookings() {
  renderPending();
  renderApproved();
  lucide.createIcons();
}

/* ─── Tab switch ─── */
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((t, i) => {
    t.classList.toggle('active', (tab === 'pending' && i === 0) || (tab === 'approved' && i === 1));
  });
  document.getElementById('pending-list').classList.toggle('active',  tab === 'pending');
  document.getElementById('approved-list').classList.toggle('active', tab === 'approved');
}

/* ─── Init ─── */
initBookings();
</script>
</body>
</html>
